<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>тнР Catch The Stars</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#05071a;font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s;}
.screen.hidden{opacity:0;pointer-events:none;}
#homeScreen{background:radial-gradient(ellipse at 50% 35%,#0d1b4a,#05071a 70%);}
.home-title{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,5vw,4.5rem);color:#ffe566;text-shadow:0 0 30px #ffe56699;letter-spacing:2px;margin-bottom:8px;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{text-shadow:0 0 30px #ffe56699;}50%{text-shadow:0 0 55px #ffe566cc,0 0 90px #ffaa0077;}}
.home-sub{color:#7788bb;font-size:.95rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.level-grid{display:flex;gap:20px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;}
.level-card{cursor:pointer;border-radius:18px;padding:22px 28px;text-align:center;border:2px solid transparent;transition:transform .2s,box-shadow .2s;min-width:130px;user-select:none;}
.level-card:hover{transform:scale(1.08) translateY(-4px);}
.level-card.lv1{background:linear-gradient(135deg,#1a3a1a,#0d2a0d);border-color:#44dd44;}
.level-card.lv2{background:linear-gradient(135deg,#2a2a0a,#1a1a00);border-color:#ffcc00;}
.level-card.lv3{background:linear-gradient(135deg,#3a0a0a,#200000);border-color:#ff4444;}
.level-card:hover.lv1{box-shadow:0 8px 30px #44dd4455;}
.level-card:hover.lv2{box-shadow:0 8px 30px #ffcc0055;}
.level-card:hover.lv3{box-shadow:0 8px 30px #ff444455;}
.lv-emoji{font-size:2.4rem;margin-bottom:6px;}
.lv-name{font-family:'Fredoka One',cursive;font-size:1.3rem;margin-bottom:4px;}
.lv1 .lv-name{color:#44dd44;}.lv2 .lv-name{color:#ffcc00;}.lv3 .lv-name{color:#ff4444;}
.lv-desc{font-size:.78rem;color:#8899bb;line-height:1.6;}
#hud{position:fixed;top:0;left:0;right:0;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:10;}
.hud-score{font-family:'Fredoka One',cursive;font-size:1.9rem;color:#ffe566;text-shadow:0 0 12px #ffe56688;}
.hud-lives{font-size:1.5rem;letter-spacing:3px;}
.hud-badge{font-family:'Fredoka One',cursive;font-size:1rem;padding:6px 16px;border-radius:20px;letter-spacing:1px;}
.badge-easy{background:#44dd4422;border:1.5px solid #44dd44;color:#44dd44;}
.badge-medium{background:#ffcc0022;border:1.5px solid #ffcc00;color:#ffcc00;}
.badge-hard{background:#ff444422;border:1.5px solid #ff4444;color:#ff4444;}
#prog-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:min(380px,78vw);z-index:10;pointer-events:none;text-align:center;}
#prog-label{font-family:'Fredoka One',cursive;font-size:.8rem;color:#aac4ff;margin-bottom:5px;letter-spacing:2px;}
#prog-bg{height:9px;background:#ffffff15;border-radius:99px;overflow:hidden;}
#prog-fill{height:100%;border-radius:99px;width:0%;transition:width .3s;}
.fill-easy{background:linear-gradient(90deg,#44dd44,#88ff88);box-shadow:0 0 8px #44dd4466;}
.fill-medium{background:linear-gradient(90deg,#ffcc00,#ffee66);box-shadow:0 0 8px #ffcc0066;}
.fill-hard{background:linear-gradient(90deg,#ff4444,#ff8888);box-shadow:0 0 8px #ff444466;}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,7,26,.88);backdrop-filter:blur(10px);z-index:20;opacity:0;pointer-events:none;transition:opacity .45s;}
#overlay.show{opacity:1;pointer-events:all;}
#ov-emoji{font-size:5rem;margin-bottom:10px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
#ov-title{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,5vw,3.8rem);margin-bottom:8px;}
#ov-sub{color:#8899cc;font-size:1rem;font-weight:700;margin-bottom:36px;text-align:center;line-height:1.8;}
.ov-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:'Fredoka One',cursive;font-size:1.2rem;border:none;padding:13px 36px;border-radius:50px;cursor:pointer;transition:transform .15s;}
.btn:hover{transform:scale(1.07) translateY(-2px);}
.btn-gold{color:#05071a;background:linear-gradient(135deg,#ffe566,#ffb300);box-shadow:0 6px 22px #ffb30055;}
.btn-dark{color:#aac4ff;background:#1a2244;border:1.5px solid #3355aa;}
</style>
</head>
<body>

<div id="homeScreen" class="screen">
  <canvas id="homeBg" style="position:absolute;inset:0;pointer-events:none;"></canvas>
  <div style="position:relative;text-align:center;padding:20px;">
    <div class="home-title">тнР Catch The Stars</div>
    <div class="home-sub">Choose Your Difficulty</div>
    <div class="level-grid">
      <div class="level-card lv1" data-level="1">
        <div class="lv-emoji">ЁЯМ▒</div>
        <div class="lv-name">EASY</div>
        <div class="lv-desc">Slow stars<br>5 lives ┬╖ Catch 15<br>Few comets</div>
      </div>
      <div class="level-card lv2" data-level="2">
        <div class="lv-emoji">ЁЯФе</div>
        <div class="lv-name">MEDIUM</div>
        <div class="lv-desc">Faster stars<br>3 lives ┬╖ Catch 20<br>More comets!</div>
      </div>
      <div class="level-card lv3" data-level="3">
        <div class="lv-emoji">ЁЯТА</div>
        <div class="lv-name">HARD</div>
        <div class="lv-desc">Blazing fast<br>2 lives ┬╖ Catch 25<br>Comet storm!</div>
      </div>
    </div>
    <div style="color:#445566;font-size:.85rem;">ЁЯЦ▒я╕П Mouse &nbsp;┬╖&nbsp; тМия╕П Arrow Keys / A &amp; D</div>
  </div>
</div>

<div id="gameScreen" class="screen hidden">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div class="hud-score">тнР <span id="hudScore">0</span></div>
    <div class="hud-lives" id="hudLives"></div>
    <div class="hud-badge" id="hudBadge"></div>
  </div>
  <div id="prog-wrap">
    <div id="prog-label">STARS CAUGHT</div>
    <div id="prog-bg"><div id="prog-fill"></div></div>
  </div>
  <div id="overlay">
    <div id="ov-emoji"></div>
    <div id="ov-title"></div>
    <div id="ov-sub"></div>
    <div class="ov-btns">
      <button class="btn btn-gold" id="btnRestart">тЦ╢ Play Again</button>
      <button class="btn btn-dark" id="btnHome">ЁЯПа Menu</button>
    </div>
  </div>
</div>

<script>
// тФАтФА roundRect polyfill тФАтФА
function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

// тФАтФА Home bg тФАтФА
const homeBg=document.getElementById('homeBg'),hc=homeBg.getContext('2d');
let hs=[];
function rsHome(){homeBg.width=innerWidth;homeBg.height=innerHeight;hs=Array.from({length:200},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5+.3,a:Math.random(),sp:Math.random()*.014+.005}));}
rsHome();window.addEventListener('resize',rsHome);
(function ah(){hc.clearRect(0,0,homeBg.width,homeBg.height);hs.forEach(s=>{s.a+=s.sp;if(s.a>1)s.a=0;const al=Math.sin(s.a*Math.PI);hc.beginPath();hc.arc(s.x,s.y,s.r,0,Math.PI*2);hc.fillStyle=`rgba(255,240,150,${al*.9})`;hc.fill();});requestAnimationFrame(ah);})();

// тФАтФА Configs тФАтФА
const CFGS={
  1:{name:'EASY',  bc:'badge-easy',  fc:'fill-easy',  lives:5,target:15,spd:.7, ms:950,bomb:.04,inc:.07},
  2:{name:'MEDIUM',bc:'badge-medium',fc:'fill-medium',lives:3,target:20,spd:1.0,ms:750,bomb:.12,inc:.12},
  3:{name:'HARD',  bc:'badge-hard',  fc:'fill-hard',  lives:2,target:25,spd:1.4,ms:500,bomb:.22,inc:.17},
};
const STARS=[{e:'тнР',p:1,s:34,g:'#ffe566'},{e:'ЁЯТл',p:2,s:32,g:'#ccddff'},{e:'ЁЯМЯ',p:3,s:38,g:'#ffffff'}];
const BOMB={e:'тШДя╕П',p:-1,s:30,g:'#ff6633'};

// тФАтФА Canvas & refs тФАтФА
const cv=document.getElementById('canvas'),cx=cv.getContext('2d');
const homeScr=document.getElementById('homeScreen'),gameScr=document.getElementById('gameScreen');
const ovl=document.getElementById('overlay'),ovE=document.getElementById('ov-emoji'),ovT=document.getElementById('ov-title'),ovS=document.getElementById('ov-sub');
const hsEl=document.getElementById('hudScore'),hlEl=document.getElementById('hudLives'),hbEl=document.getElementById('hudBadge'),pf=document.getElementById('prog-fill');
const TW=150,TH=16;
let W,H,cfg,score,lives,playing,tx,tt,bgs=[],fall=[],parts=[],fts=[],shk=0,stm=null,mx=null,keys={};

function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
rsz();window.addEventListener('resize',rsz);

function initBg(){bgs=Array.from({length:220},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.3,a:Math.random()*Math.PI*2,sp:Math.random()*.01+.004}));}

function spawn(){
  if(!playing)return;
  const isB=Math.random()<cfg.bomb;
  const t=isB?BOMB:STARS[Math.random()<.54?0:Math.random()<.68?1:2];
  const v=cfg.spd+Math.floor(score/5)*cfg.inc+Math.random()*.25;
  fall.push({x:Math.random()*(W-80)+40,y:-40,t,vy:v,wb:Math.random()*Math.PI*2,ws:(Math.random()-.5)*.04});
  stm=setTimeout(spawn,Math.max(190,cfg.ms-Math.floor(score/5)*38));
}

function burst(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*7+2;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,d:Math.random()*.04+.02,r:Math.random()*4+2,col});}}
function ftxt(x,y,t){fts.push({x,y,t,l:1});}

function uhud(){
  hsEl.textContent=score;
  hlEl.textContent='тЭдя╕П'.repeat(lives)+'ЁЯЦд'.repeat(cfg.lives-lives);
  pf.style.width=Math.min(100,score/cfg.target*100)+'%';
}

document.addEventListener('mousemove',e=>{if(playing)mx=e.clientX-TW/2;});
document.addEventListener('touchmove',e=>{if(playing){mx=e.touches[0].clientX-TW/2;e.preventDefault();}},{passive:false});
document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function drawBg(){
  const g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#000820');g.addColorStop(.55,'#011240');g.addColorStop(1,'#000510');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  bgs.forEach(s=>{s.a+=s.sp;const al=(Math.sin(s.a)+1)/2*.85+.1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(220,230,255,${al})`;cx.fill();});
}

function drawMoon(){
  const mx2=W-110,my=85;
  const gr=cx.createRadialGradient(mx2,my,18,mx2,my,82);gr.addColorStop(0,'rgba(255,242,180,.26)');gr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=gr;cx.beginPath();cx.arc(mx2,my,82,0,Math.PI*2);cx.fill();
  cx.save();cx.shadowColor='#fffbe0';cx.shadowBlur=18;cx.beginPath();cx.arc(mx2,my,43,0,Math.PI*2);cx.fillStyle='#fff8d6';cx.fill();cx.restore();
  [[mx2-11,my-7,7],[mx2+13,my+9,5],[mx2-4,my+15,4]].forEach(([a,b,r])=>{cx.beginPath();cx.arc(a,b,r,0,Math.PI*2);cx.fillStyle='rgba(200,185,120,.32)';cx.fill();});
}

function updTray(){
  if(keys['ArrowLeft']||keys['a'])tt-=16;
  if(keys['ArrowRight']||keys['d'])tt+=16;
  if(mx!==null)tt=mx;
  tt=Math.max(0,Math.min(W-TW,tt));
  tx+=(tt-tx)*.18;
}

function drawTray(){
  const ty=H-128;
  const gr=cx.createRadialGradient(tx+TW/2,ty,4,tx+TW/2,ty,TW*.75);gr.addColorStop(0,'rgba(255,220,60,.28)');gr.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=gr;cx.fillRect(tx-30,ty-18,TW+60,46);
  cx.save();cx.shadowColor='#ffe566';cx.shadowBlur=20;
  const g2=cx.createLinearGradient(tx,ty,tx,ty+TH);g2.addColorStop(0,'#ffe97a');g2.addColorStop(1,'#e6a800');
  cx.fillStyle=g2;rr(cx,tx,ty,TW,TH,8);cx.fill();
  cx.fillStyle='rgba(255,255,255,.22)';rr(cx,tx+6,ty+2,TW-12,4,3);cx.fill();
  cx.restore();
}

function drawGirl(){cx.font='108px serif';cx.textAlign='center';cx.textBaseline='bottom';cx.fillText('ЁЯСз',tx+TW/2,H-4);}

let bannerA=0,bannerT='';
function updFall(){
  const ty=H-128;
  for(let i=fall.length-1;i>=0;i--){
    const s=fall[i];s.y+=s.vy;s.wb+=s.ws;s.x+=Math.sin(s.wb)*.55;
    if(s.y>ty-18&&s.y<ty+32&&s.x>tx-10&&s.x<tx+TW){
      if(s.t.p<0){lives--;burst(s.x,ty,'#ff4422',22);shk=12;}
      else{score+=s.t.p;burst(s.x,ty,s.t.g,18);ftxt(s.x,ty-28,s.t.p>1?`+${s.t.p}тЬи`:'+1');if(score>=cfg.target)winGame();}
      uhud();fall.splice(i,1);if(lives<=0&&playing)loseGame();continue;
    }
    if(s.y>H+50){if(s.t.p>0){lives--;shk=8;uhud();}fall.splice(i,1);if(lives<=0&&playing)loseGame();continue;}
    cx.save();cx.shadowColor=s.t.g;cx.shadowBlur=18;cx.font=s.t.s+'px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.t.e,s.x,s.y);cx.restore();
  }
}

function updFX(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.l-=p.d;
    cx.beginPath();cx.arc(p.x,p.y,Math.max(0,p.r*p.l),0,Math.PI*2);cx.fillStyle=p.col;cx.globalAlpha=Math.max(0,p.l);cx.fill();cx.globalAlpha=1;
    if(p.l<=0)parts.splice(i,1);
  }
  for(let i=fts.length-1;i>=0;i--){
    const f=fts[i];f.y-=1.6;f.l-=.028;
    cx.save();cx.globalAlpha=Math.max(0,f.l);cx.font='bold 21px Nunito,sans-serif';cx.fillStyle='#ffe566';cx.textAlign='center';cx.shadowColor='#ffe566';cx.shadowBlur=10;cx.fillText(f.t,f.x,f.y);cx.restore();
    if(f.l<=0)fts.splice(i,1);
  }
  if(bannerA>0){
    cx.save();cx.globalAlpha=Math.min(1,bannerA);cx.font='bold 46px Fredoka One,cursive';cx.fillStyle='#ffe566';cx.textAlign='center';cx.shadowColor='#ffe566';cx.shadowBlur=30;cx.fillText(bannerT,W/2,H/2-50);cx.restore();
    bannerA-=.018;
  }
}

function loop(){
  requestAnimationFrame(loop);cx.clearRect(0,0,W,H);
  if(shk>0){cx.save();cx.translate((Math.random()-.5)*shk,(Math.random()-.5)*shk);shk*=.72;if(shk<.5)shk=0;}
  drawBg();drawMoon();updTray();updFall();updFX();drawTray();drawGirl();
  if(shk>0)cx.restore();
}

function startGame(lv){
  cfg=CFGS[lv];score=0;lives=cfg.lives;playing=true;
  tx=W/2-TW/2;tt=tx;fall=[];parts=[];fts=[];bannerA=0;shk=0;mx=null;
  hbEl.className='hud-badge '+cfg.bc;hbEl.textContent=cfg.name;
  pf.className=cfg.fc;uhud();
  ovl.classList.remove('show');
  homeScr.classList.add('hidden');gameScr.classList.remove('hidden');
  if(stm)clearTimeout(stm);initBg();spawn();
}

function winGame(){
  playing=false;
  ovE.textContent='ЁЯОЙ';ovT.textContent='YOU WIN!';ovT.style.color='#ffe566';
  ovS.innerHTML=`Caught <b style="color:#ffe566">${score}</b> stars on <b style="color:#ffe566">${cfg.name}</b>!<br>Try a harder level?`;
  ovl.classList.add('show');
}
function loseGame(){
  playing=false;
  ovE.textContent='ЁЯТА';ovT.textContent='GAME OVER';ovT.style.color='#ff5566';
  ovS.innerHTML=`Caught <b style="color:#ffe566">${score}</b> / ${cfg.target} on <b style="color:#ffe566">${cfg.name}</b>.<br>Try again!`;
  ovl.classList.add('show');
}

document.querySelectorAll('.level-card').forEach(c=>c.addEventListener('click',()=>startGame(+c.dataset.level)));
document.getElementById('btnRestart').addEventListener('click',()=>startGame(+Object.keys(CFGS).find(k=>CFGS[k].name===cfg.name)));
document.getElementById('btnHome').addEventListener('click',()=>{
  playing=false;if(stm)clearTimeout(stm);
  ovl.classList.remove('show');gameScr.classList.add('hidden');homeScr.classList.remove('hidden');
});

loop();
</script>
</body>
</html>
