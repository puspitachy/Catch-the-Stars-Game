<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Code Catcher Jr</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#87CEEB;}
canvas{display:block;}

#ui{
position:absolute;top:10px;left:10px;
font-size:18px;font-weight:bold;
background:#ffffffaa;padding:8px 15px;border-radius:10px;
}

#menu{
position:absolute;inset:0;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:#0008;color:white;
}

button{
padding:12px 25px;
font-size:18px;
border:none;border-radius:10px;
cursor:pointer;margin:10px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
⭐ <span id="score">0</span> |
❤️ <span id="lives">5</span> |
🚀 Level <span id="level">1</span>
</div>

<div id="menu">
<h1>🎮 Code Catcher Jr</h1>
<button onclick="startGame('easy')">Easy</button>
<button onclick="startGame('medium')">Medium</button>
<button onclick="startGame('hard')">Hard</button>
</div>

<script>
// ================= AUDIO =================
const sounds = {
  win: new Audio("./winner.mp3"),
  bonus: new Audio("./bonus.mp3"),
  clock: new Audio("./clock.mp3"),
  gameover: new Audio("./game over cartoon.mp3"),
  level: new Audio("./mixkit-game-level-completed-2059.wav"),
  cheer: new Audio("./cheer.wav")
};

// unlock audio (GitHub Pages fix)
document.addEventListener("click", () => {
  Object.values(sounds).forEach(s => {
    s.volume = 0.5;
    s.play().then(() => {
      s.pause();
      s.currentTime = 0;
    }).catch(()=>{});
  });
}, { once: true });

// safe play
function playSound(s){
  if(!s) return;
  s.currentTime = 0;
  s.play().catch(()=>{});
}

// ================= CANVAS =================
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let W,H;
function resize(){
  W=c.width=window.innerWidth;
  H=c.height=window.innerHeight;
}
window.onresize=resize;
resize();

// ================= GAME STATE =================
let player, items;
let score=0, lives=5, level=1;
let difficulty="easy";
let running=false;

let speed=1.5;
let spawnDelay=1800;

let correctStreak=0;
let levelProgress=0;
let clockPlayed=false;

// ================= START =================
function startGame(diff){
  document.getElementById("menu").style.display="none";

  difficulty = diff;
  level = 1;
  score = 0;
  correctStreak = 0;
  levelProgress = 0;
  clockPlayed = false;

  if(diff==="easy"){ lives=5; speed=1.5; spawnDelay=1800;}
  if(diff==="medium"){ lives=3; speed=2.5; spawnDelay=1300;}
  if(diff==="hard"){ lives=2; speed=3.5; spawnDelay=900;}

  player={x:W/2,w:120};
  items=[];
  running=true;

  spawn();
  loop();
}

// ================= SPAWN =================
function spawn(){
  if(!running) return;

  let item;

  // 60% code, 40% bonus
  if(Math.random() < 0.6){
    let correct = Math.random() > 0.4;

    item={
      x:Math.random()*(W-150),
      y:-40,
      text: correct ? "print('Hi')" : "print Hi",
      correct: correct,
      bonus:false,
      speed:speed
    };
  }else{
    item={
      x:Math.random()*(W-80),
      y:-40,
      text:"🎁",
      correct:false,
      bonus:true,
      speed:speed
    };
  }

  items.push(item);

  setTimeout(spawn, spawnDelay);
}

// ================= CONTROL =================
document.addEventListener("mousemove", e=>{
  if(player) player.x = e.clientX - player.w/2;
});

// ================= GAME LOOP =================
function loop(){
  if(!running) return;

  ctx.clearRect(0,0,W,H);

  // PLAYER
  ctx.fillStyle="#ff9800";
  ctx.fillRect(player.x,H-40,player.w,20);

  // ITEMS
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];
    it.y+=it.speed;

    ctx.fillStyle = it.bonus ? "#2196f3" : it.correct ? "#2e7d32" : "#c62828";
    ctx.fillRect(it.x,it.y,140,40);

    ctx.fillStyle="white";
    ctx.font="16px monospace";
    ctx.fillText(it.text,it.x+10,it.y+25);

    // COLLISION
    if(it.y+40>H-40 && it.x<player.x+player.w && it.x+140>player.x){

      if(it.bonus){
        score+=20;
        playSound(sounds.bonus);
      }

      else if(it.correct){
        score+=10;
        correctStreak++;
        levelProgress++;

        if(correctStreak>=3){
          playSound(sounds.cheer);
          correctStreak=0;
        }
      }

      else{
        lives--;
        correctStreak=0;
      }

      items.splice(i,1);
    }

    // MISSED
    else if(it.y>H){
      if(it.correct) lives--;
      items.splice(i,1);
    }
  }

  // CLOCK WARNING (only once)
  if(lives===1 && !clockPlayed){
    playSound(sounds.clock);
    clockPlayed = true;
  }

  // LEVEL COMPLETE
  if(levelProgress >= 5){
    playSound(sounds.level);
    level++;
    levelProgress=0;

    speed += 0.3;
    spawnDelay = Math.max(600, spawnDelay - 100);

    // Difficulty progression
    if(level > 6){
      if(difficulty==="easy"){
        playSound(sounds.win);
        startGame("medium");
        return;
      }
      if(difficulty==="medium"){
        playSound(sounds.win);
        startGame("hard");
        return;
      }
      if(difficulty==="hard"){
        winGame();
        return;
      }
    }
  }

  // GAME OVER
  if(lives<=0){
    running=false;
    playSound(sounds.gameover);
    alert("Game Over 😢");
    location.reload();
    return;
  }

  // UPDATE UI
  scoreEl.textContent=score;
  livesEl.textContent=lives;
  levelEl.textContent=level;

  requestAnimationFrame(loop);
}

// ================= WIN =================
function winGame(){
  running=false;
  playSound(sounds.win);
  alert("🎉 YOU WON ALL LEVELS!");
  location.reload();
}

// ================= UI =================
const scoreEl=document.getElementById("score");
const livesEl=document.getElementById("lives");
const levelEl=document.getElementById("level");

</script>
</body>
</html>
