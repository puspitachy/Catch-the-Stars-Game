<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Code Catcher JR — Catch the Code!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
:root {
  --bg:#0d0f1a; --panel:#131629; --panel2:#1a1f38;
  --accent:#00e5ff; --yellow:#ffe566; --purple:#b57aff;
  --red:#ff4d6d; --orange:#ff8c42; --blue:#4fc3f7;
  --text:#e8f0ff; --muted:#8892b0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;transition:opacity .3s,transform .3s;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97);}

/* TITLE */
#titleScreen{background:radial-gradient(ellipse at 25% 20%,#1a2a5e,#0d0f1a 60%),radial-gradient(ellipse at 80% 80%,#1a0a2e,transparent 50%);padding:1rem;}
.title-logo{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,7vw,4.5rem);color:var(--yellow);text-shadow:0 0 40px rgba(255,229,102,.5);text-align:center;line-height:1.1;}
.title-sub{color:var(--accent);font-size:clamp(.85rem,2.5vw,1.1rem);font-weight:700;margin:.4rem 0 1.2rem;text-align:center;}
.machine-anim{font-size:clamp(2.5rem,8vw,5rem);animation:float 3s ease-in-out infinite;margin:.5rem 0;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.buddy-row{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin:1rem 0;}
.buddy-card{background:var(--panel2);border:3px solid transparent;border-radius:18px;padding:.8rem 1rem;cursor:pointer;transition:.18s;text-align:center;min-width:90px;}
.buddy-card:hover{border-color:var(--accent);transform:translateY(-3px);}
