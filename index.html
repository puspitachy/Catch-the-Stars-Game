<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Star Coder Kids | Catch the Magic Syntax</title>
<style>
/* Your existing CSS styles (truncated for brevity). Add the following styles for Quit button: */
#quitBtn {
  background: #ff4d4d;
  font-size: clamp(1rem, 4vw, 1.35rem);
  padding: 10px 22px;
  border-radius: 999px;
  margin: 8px 5px;
  box-shadow: 0 7px 0 #b22222;
  cursor: pointer;
}
#quitBtn:hover {
  background: #ff1a1a;
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="1372" height="1466"></canvas>

<div class="ui-panel">
  <!-- Your existing UI code ... -->
  <!-- Add a "Quit Game" button below the other buttons -->
  <div class="setup-actions" style="margin-top:20px;">
    <button id="quitBtn">Quit Game</button>
  </div>
</div>

<div id="gameOverlay" class="gameover-panel">
  <div class="over-card">
    <!-- Your game over content ... -->
    <button id="restartGameBtn" class="restart-btn">🔄 PLAY AGAIN</button>
    <button id="homeBtnOverlay" class="restart-btn">🏠 HOME</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0;
  let gameRunning = false;
  let animationId = null;
  let spawnTimer = null;
  let lastTime = 0;

  let score = 0;
  let lives = 3;
  let coins = 0;
  let fixedStars = 0;
  let starsNeeded = 5;
  let level = 1;
  let streak = 0;
  let activeCategory = "Basics";
  let bestRank = "";
  let difficulty = "easy";
  let leaderboardMode = "Easy";
  let gameTheme = "light";

  let activeHint = 0;
  let activeShield = 0;
  let activeMagnet = 0;
  let danceTimer = 0;

  let items = [];
  let particles = [];
  let floaters = [];

  let playerX = 0;
  let targetX = 0;
  let catcherW = 130;
  const CATCHER_H = 24;
  let groundY = 0;
  let hero = "kid";

  const heroEmojiMap = { kid: "🧒", robot: "🤖", cat: "🐱" };
  const heroNameMap = { kid: "Sunny Coder", robot: "Byte Buddy", cat: "Debug Kitty" };
  const leaderboardKey = "codeCatcherJrLeaderboard";

  const categoryOrder = ["Basics", "Loops", "Logic", "Functions", "Collections"];

  const themePalettes = {
    light: {
      skyTop: "#fff0c8",
      skyMid: "#bde7fb",
      skyBottom: "#ddf3d9",
      sun: "#ffd76a",
      cloud: "#ffffff",
      cloudAlpha: 0.62,
      sparkle: "255,245,185",
      hill: "rgba(125, 183, 118, 0.34)",
      ground: "#9fd082",
      groundStripe: "#88b56e",
      correctCard: "rgba(32, 47, 35, 0.9)",
      wrongCard: "rgba(55, 29, 35, 0.92)",
      correctText: "#fff1a6",
      wrongText: "#ffd4d4",
      correctBorder: "#ffd96f",
      wrongBorder: "#ff8f95",
      power: "#fff0b5"
    },
    night: {
      skyTop: "#10172f",
      skyMid: "#172c55",
      skyBottom: "#264563",
      sun: "#f7df8f",
      cloud: "#b8c9e8",
      cloudAlpha: 0.28,
      sparkle: "210,230,255",
      hill: "rgba(73, 119, 129, 0.34)",
      ground: "#375f5d",
      groundStripe: "#2c4d4e",
      correctCard: "rgba(242, 250, 214, 0.95)",
      wrongCard: "rgba(255, 230, 233, 0.95)",
      correctText: "#16372d",
      wrongText: "#5a1828",
      correctBorder: "#9ff0c7",
      wrongBorder: "#ff88a2",
      power: "#ffeaa5"
    }
  };

  const difficultySettings = {
    easy: {
      label: "Easy",
      speed: 0.28,
      delay: 2.05,
      correctChance: 0.84,
      powerChance: 0.18,
      categories: ["Basics", "Collections"],
      maxChallengeLevel: 1,
      starsNeeded: 3,
      maxLevel: 6,
      lives: 5
    },
    medium: {
      label: "Medium",
      speed: 0.42,
      delay: 1.65,
      correctChance: 0.58,
      powerChance: 0.12,
      categories: ["Basics", "Loops", "Logic", "Functions", "Collections"],
      maxChallengeLevel: 3,
      starsNeeded: 4,
      maxLevel: 6,
      lives: 3
    },
    hard: {
      label: "Hard",
      speed: 0.58,
      delay: 1.35,
      correctChance: 0.44,
      powerChance: 0.08,
      categories: ["Basics", "Loops", "Logic", "Functions", "Collections"],
      maxChallengeLevel: 4,
      starsNeeded: 5,
      maxLevel: 6,
      lives: 2
    }
  };

  let categoryStats = {};

  const kidChallenges = [
    { category: "Basics", minLevel: 1, correct: "print('Hello')", wrongs: ["print(Hello)", "Print Hello", "echo Hello"], why: "print needs parentheses and quotes around words." },
    { category: "Basics", minLevel: 1, correct: "star = 'magic'", wrongs: ["star == 'magic'", "star magic", "let star"], why: "One equals sign stores a value in a variable." },
    { category: "Basics", minLevel: 2, correct: "name = 'Ada'", wrongs: ["name == 'Ada'", "name Ada", "set name Ada"], why: "A variable gets text with one equals sign and quotes." },
    { category: "Loops", minLevel: 1, correct: "for i in range(3):", wrongs: ["for i in range3", "loop i=3", "for i to 3"], why: "A Python for loop needs range(3) and a colon." },
    { category: "Loops", minLevel: 2, correct: "while True:", wrongs: ["while true", "repeat forever", "while True"], why: "Python uses capital True and a colon for while loops." },
    { category: "Loops", minLevel: 3, correct: "break", wrongs: ["stop()", "end loop", "brake"], why: "break is the Python word that exits a loop." },
    { category: "Logic", minLevel: 1, correct: "if x == 5:", wrongs: ["if x = 5:", "if x equals 5", "when x=5"], why: "Two equals signs compare values in an if statement." },
    { category: "Logic", minLevel: 2, correct: "else:", wrongs: ["or else", "else", "otherwise:"], why: "else needs a colon so Python knows a block starts." },
    { category: "Logic", minLevel: 3, correct: "and", wrongs: ["&&", "plus", "&"], why: "Python writes the logic word as and." },
    { category: "Functions", minLevel: 1, correct: "def hello():", wrongs: ["function hello", "def hello", "new hello()"], why: "Python starts a function with def, parentheses, and a colon." },
    { category: "Functions", minLevel: 2, correct: "return score", wrongs: ["send score", "return: score", "score return"], why: "return sends a value back from a function." },
    { category: "Collections", minLevel: 1, correct: "[1, 2, 3]", wrongs: ["(1, 2, 3)", "{1, 2, 3}", "[1 2 3]"], why: "A list uses square brackets and commas." },
    { category: "Collections", minLevel: 1, correct: "{}", wrongs: ["[]", "()", "{ }"], why: "Curly braces make an empty dictionary." },
    { category: "Collections", minLevel: 2, correct: "colors.append('red')", wrongs: ["colors add red", "append.colors('red')", "colors.push = red"], why: "append adds one new item to a Python list." }
  ];

  let currentChallenge = kidChallenges[0];

  function createCategoryStats() {
    return categoryOrder.reduce((stats, name) => {
      stats[name] = { level: 1, stars: 0, needed: 3 };
      return stats;
    }, {});
  }

  function pickRandomChallenge() {
    const settings = difficultySettings[difficulty];
    activeCategory = settings.categories[(level + fixedStars + Math.floor(Math.random() * settings.categories.length)) % settings.categories.length];
    const catLevel = categoryStats[activeCategory]?.level || 1;
    const pool = kidChallenges.filter(chal => (
      chal.category === activeCategory &&
      chal.minLevel <= catLevel &&
      chal.minLevel <= settings.maxChallengeLevel
    ));
    currentChallenge = pool[Math.floor(Math.random() * pool.length)] || kidChallenges[0];
  }

  function showKidMessage(msg, duration = 1500) {
    const toast = document.getElementById("toastMsg");
    toast.textContent = msg;
    toast.style.opacity = "1";
    toast.style.transform = "translateX(-50%) translateY(0)";
    clearTimeout(window.toastTimer);
    window.toastTimer = setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.transform = "translateX(-50%) translateY(-16px)";
    }, duration);
  }

  function playTone(actx, freq, wave, volume, start, length) {
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.frequency.value = freq;
    osc.type = wave;
    gain.gain.setValueAtTime(volume, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + length);
    osc.start(start);
    osc.stop(start + length);
  }

  function playSound(type) {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      window.audioCtxGlobal = window.audioCtxGlobal || new AudioCtx();
      const actx = window.audioCtxGlobal;
      if (actx.state === "suspended") actx.resume();
      const now = actx.currentTime;
      const songs = {
        start: [[523, "triangle", 0.11, 0, 0.12], [659, "triangle", 0.11, 0.1, 0.12], [784, "triangle", 0.12, 0.2, 0.16]],
        catch: [[880, "sine", 0.16, 0, 0.12], [1175, "sine", 0.12, 0.1, 0.12]],
        streak: [[784, "square", 0.1, 0, 0.09], [988, "square", 0.1, 0.08, 0.09], [1319, "square", 0.08, 0.16, 0.12]],
        wrong: [[330, "sawtooth", 0.13, 0, 0.16], [220, "sawtooth", 0.1, 0.12, 0.2]],
        power: [[659, "triangle", 0.14, 0, 0.12], [988, "triangle", 0.1, 0.11, 0.14]],
        shield: [[392, "sine", 0.12, 0, 0.16], [392, "sine", 0.08, 0.12, 0.12]],
        level: [[523, "triangle", 0.12, 0, 0.12], [659, "triangle", 0.12, 0.11, 0.12], [784, "triangle", 0.12, 0.22, 0.12], [1047, "triangle", 0.1, 0.33, 0.2]],
        gameover: [[294, "sine", 0.12, 0, 0.18], [247, "sine", 0.1, 0.16, 0.18], [196, "sine", 0.1, 0.32, 0.26]]
      };
      (songs[type] || songs.catch).forEach(([freq, wave, volume, offset, length]) => {
        playTone(actx, freq, wave, volume, now + offset, length);
      });
    } catch(e) {}
  }

  function addParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x,
        y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 4 - 1,
        life: 0.9,
        decay: 0.02,
        color
      });
    }
  }

  function addFloatingText(x, y, text, color = "#FFD966") {
    floaters.push({ x, y, text, life: 1, vy: -1.6, color });
  }

  function bumpCategory(category) {
    const stat = categoryStats[category] || categoryStats.Basics;
    stat.stars++;
    if (stat.stars >= stat.needed) {
      stat.level++;
      stat.stars = 0;
      stat.needed = Math.min(7, stat.needed + 1);
      showKidMessage(`🎓 ${category} LEVEL ${stat.level}!`, 1200);
      playSound("level");
    }
  }

  function applyCorrectItem(item) {
    score += 10;
    coins += 1;
    streak++;
    fixedStars++;
    danceTimer = 1.2;
    bumpCategory(item.category);
    addParticles(item.x, item.y, "#FFE484", 15);
    addFloatingText(item.x, item.y - 15, "✨ +10 ✨", "#FFF2B5");
    addFloatingText(playerX + catcherW / 2, groundY - 86, "Dance!", "#f8b84e");
    playSound("catch");
    showKidMessage(`✅ Right! ${item.why}`, 2300);
    if (streak >= 3) {
      coins += 2;
      addFloatingText(item.x, item.y - 34, "🔥 STREAK!", "#FFB347");
      playSound("streak");
    }
    if (fixedStars >= starsNeeded) levelUp();
    updateUI();
  }

  function applyWrongItem(item) {
    if (activeShield > 0) {
      activeShield = Math.max(0, activeShield - 1);
      showKidMessage(`🛡️ Shield! Correct was ${item.correctAnswer}.`, 1200);
      addFloatingText(item.x, item.y - 20, "🛡️ BLOCK!", "#88ffaa");
      playSound("shield");
      updateUI();
      return;
    }
    lives--;
    streak = 0;
    addParticles(item.x, item.y, "#FFA07A", 18);
    addFloatingText(item.x, item.y - 18, "BUG! -1 ❤️", "#FFA07A");
    playSound("wrong");
    showKidMessage(`❌ Not quite. Use ${item.correctAnswer}: ${item.why}`, 2600);
    if (lives <= 0) gameOver();
    updateUI();
  }

  function levelUp() {
    const settings = difficultySettings[difficulty];
    if (level >= settings.maxLevel) {
      fixedStars = starsNeeded;
      gameOver(true);
      return;
    }
    level++;
    fixedStars = 0;
    starsNeeded = Math.min(settings.starsNeeded + Math.floor(level / 2), settings.starsNeeded + 4);
    coins += 5;
    showKidMessage(`🎉 LEVEL ${level}! SKY SPARKLES ✨`, 1800);
    addParticles(W / 2, H / 3, "#F9D56E", 28);
    playSound("level");
    if (level % 2 === 0) activeHint = 6;
    else if (level % 3 === 0) activeShield = 3;
    else activeMagnet = 7;
  }

  function activatePower(powerType) {
    if (powerType === "hint") {
      activeHint = 6;
      showKidMessage("💡 HINT! Correct answers glow!", 1300);
    }
    if (powerType === "shield") {
      activeShield = 3;
      showKidMessage("🛡️ SHIELD READY!", 1200);
    }
    if (powerType === "magnet") {
      activeMagnet = 7;
      showKidMessage("✨ MAGNET MODE!", 1200);
    }
    playSound("power");
    updateUI();
  }

  // --- Updated spawn functions ---
  function scheduleSpawn(delay) {
    clearTimeout(spawnTimer);
    spawnTimer = setTimeout(spawnItem, delay);
  }

  function spawnItem() {
    if (!gameRunning) return;
    pickRandomChallenge();

    const settings = difficultySettings[difficulty];
    const baseSpeed = (1.0 + level * 0.055) * settings.speed;
    // Limit spawn to 1 or 2 items based on level
    const itemsToSpawn = Math.min(2, Math.max(1, Math.floor(level / 2)));

    for (let i = 0; i < itemsToSpawn; i++) {
      let xPos = 50 + Math.random() * Math.max(40, W - 100);
      const isPowerup = Math.random() < settings.powerChance;
      if (isPowerup) {
        const powerList = ["hint", "shield", "magnet"];
        const chosen = powerList[Math.floor(Math.random() * powerList.length)];
        items.push({
          type: "power",
          power: chosen,
          text: chosen === "hint" ? "💡" : (chosen === "shield" ? "🛡️" : "✨"),
          x: xPos,
          y: -40,
          vy: baseSpeed,
          vx: (Math.random() - 0.5) * 0.5,
          size: 34
        });
      } else {
        const isCorrectDrop = Math.random() < settings.correctChance;
        const displayText = isCorrectDrop
          ? currentChallenge.correct
          : currentChallenge.wrongs[Math.floor(Math.random() * currentChallenge.wrongs.length)];
        let size = Math.min(34, 19 + Math.floor(displayText.length / 4));
        size = Math.min(size, Math.max(17, (W - 48) / Math.max(8, displayText.length * 0.62)));
        const estimatedWidth = displayText.length * size * 0.62;
        const margin = Math.min(W / 2 - 22, Math.max(44, estimatedWidth / 2 + 20));
        xPos = margin + Math.random() * Math.max(1, W - margin * 2);
        items.push({
          type: "code",
          text: displayText,
          category: currentChallenge.category,
          correctAnswer: currentChallenge.correct,
          why: currentChallenge.why,
          isCorrect: displayText === currentChallenge.correct,
          x: xPos,
          y: -40,
          vy: baseSpeed + Math.random() * 0.16 * settings.speed,
          vx: (Math.random() - 0.5) * 0.6,
          size
        });
      }
    }

    // Adjust spawn rate: slower at early levels, faster at higher levels
    const delay = Math.max(1500, (1000 - level * 100)) * settings.delay;
    scheduleSpawn(delay + Math.random() * 420);
  }

  // --- Remaining functions: updateUI, drawBackground, drawCloud, drawItems, drawEffects, drawPlayer, etc., are the same as your original code ---

  function updateUI() {
    document.getElementById("scoreValue").innerText = score;
    document.getElementById("livesValue").innerText = lives;
    document.getElementById("coinsValue").innerText = coins;
    document.getElementById("levelValue").innerText = level;
    document.getElementById("starCounter").innerText = `${fixedStars} / ${starsNeeded}`;
    document.getElementById("starFill").style.width = `${(fixedStars / starsNeeded) * 100}%`;
    const stat = categoryStats[activeCategory] || categoryStats.Basics;
    document.getElementById("categoryName").innerText = activeCategory;
    document.getElementById("categoryLevel").innerText = `Lv ${level}/6`;
    document.getElementById("categoryFill").style.width = `${(stat.stars / stat.needed) * 100}%`;
    document.getElementById("hintTimer").innerText = activeHint > 0 ? ` ${Math.ceil(activeHint)}s` : "";
    document.getElementById("shieldTimer").innerText = activeShield > 0 ? ` ${Math.ceil(activeShield)}` : "";
    document.getElementById("magnetTimer").innerText = activeMagnet > 0 ? ` ${Math.ceil(activeMagnet)}s` : "";
    document.getElementById("powerHint").classList.toggle("active", activeHint > 0);
    document.getElementById("powerShield").classList.toggle("active", activeShield > 0);
    document.getElementById("powerStarMagnet").classList.toggle("active", activeMagnet > 0);
  }

  function readLeaderboard() {
    try {
      return JSON.parse(localStorage.getItem(leaderboardKey)) || [];
    } catch(e) { return []; }
  }

  function writeLeaderboard(rows) {
    localStorage.setItem(leaderboardKey, JSON.stringify(rows.slice(0, 90)));
  }

  function topCategorySummary() {
    return categoryOrder.map(name => `${name} Lv ${categoryStats[name].level}`).join(" • ");
  }

  function renderLeaderboard() {
    const list = document.getElementById("leaderboardList");
    const rows = readLeaderboard()
      .filter(row => (row.difficulty || "Easy") === leaderboardMode)
      .sort((a, b) => b.score - a.score || b.level - a.level || b.coins - a.coins)
      .slice(0, 10);
    if (!rows.length) {
      list.innerHTML = `<li class="empty-score"><span>No ${leaderboardMode} scores yet. Be first!</span></li>`;
      return;
    }
    const badges = [
      { icon: "🥇", klass: "badge-gold", label: "Gold" },
      { icon: "🥈", klass: "badge-silver", label: "Silver" },
      { icon: "🥉", klass: "badge-bronze", label: "Bronze" }
    ];
    list.innerHTML = rows.map((row, index) => (
      `<li><b>${row.heroName || "Sunny Coder"}</b><span class="score-pill">${row.score}</span><span class="badge-pill ${badges[index]?.klass || "badge-star"}" title="${badges[index]?.label || "Top 10"}">${badges[index]?.icon || "⭐"}</span></li>`
    )).join("");
  }

  function saveLeaderboard() {
    const rows = readLeaderboard();
    const entry = {
      hero: heroEmojiMap[hero] || "🧒",
      heroName: heroNameMap[hero] || "Sunny Coder",
      score,
      coins,
      level,
      difficulty: difficultySettings[difficulty].label,
      categories: topCategorySummary(),
      date: new Date().toLocaleDateString()
    };
    rows.push(entry);
    const modeRows = rows
      .filter(row => (row.difficulty || "Easy") === entry.difficulty)
      .sort((a, b) => b.score - a.score || b.level - a.level || b.coins - a.coins);
    const rank = modeRows.indexOf(entry) + 1;
    writeLeaderboard(rows);
    const rankNames = ["🥇 Gold badge", "🥈 Silver badge", "🥉 Bronze badge"];
    bestRank = rank <= 3 ? rankNames[rank - 1] : (rank <= 5 ? `🏆 Leaderboard rank #${rank}` : "Keep going for the top 5!");
    leaderboardMode = entry.difficulty;
    document.querySelectorAll(".leaderboard-tab").forEach(tab => {
      tab.classList.toggle("active", tab.dataset.boardMode === leaderboardMode);
    });
    renderLeaderboard();
  }

  function gameOver(won = false) {
    gameRunning = false;
    clearTimeout(spawnTimer);
    saveLeaderboard();
    playSound("gameover");
    document.getElementById("finalScoreMsg").innerHTML = `🎈 Your Score: ${score} &nbsp; 🪙 Coins: ${coins}<br>⭐ You reached level ${level} / 6!`;
    document.getElementById("rankMsg").innerHTML = `<b>${bestRank}</b><span>${topCategorySummary()}</span>`;
    document.getElementById("gameoverText").innerHTML = won ? "🎉 You finished all 6 levels!" : "⭐ Don't worry! Try again! 🌙";
    document.getElementById("gameOverlay").classList.add("show");
  }

  function resetGame() {
    score = 0;
    lives = difficultySettings[difficulty].lives;
    coins = 0;
    fixedStars = 0;
    starsNeeded = difficultySettings[difficulty].starsNeeded;
    level = 1;
    streak = 0;
    activeCategory = "Basics";
    bestRank = "";
    categoryStats = createCategoryStats();
    activeHint = 0;
    activeShield = 0;
    activeMagnet = 0;
    items = [];
    particles = [];
    floaters = [];
    pickRandomChallenge();
    updateUI();
  }

  function startGameSession() {
    resetGame();
    gameRunning = true;
    lastTime = performance.now();
    document.getElementById("startScreen").classList.add("hide");
    document.getElementById("gameOverlay").classList.remove("show");
    scheduleSpawn(600);
    showKidMessage(`${difficultySettings[difficulty].label} mode! Catch the RIGHT code.`, 1800);
    playSound("start");
    if (!animationId) animationId = requestAnimationFrame(animate);
  }

  function goHome() {
    gameRunning = false;
    clearTimeout(spawnTimer);
    items = [];
    document.getElementById("startScreen").classList.remove("hide");
    document.getElementById("gameOverlay").classList.remove("show");
    showBuddyStep();
  }

  function showBuddyStep() {
    document.getElementById("startScreen").classList.remove("setup-mode");
    document.getElementById("startScreen").scrollTop = 0;
    document.getElementById("buddyStep").classList.remove("hidden");
    document.getElementById("setupStep").classList.add("hidden");
  }

  function showSetupStep() {
    document.getElementById("startScreen").classList.add("setup-mode");
    document.getElementById("startScreen").scrollTop = 0;
    document.getElementById("buddyStep").classList.add("hidden");
    document.getElementById("setupStep").classList.remove("hidden");
    document.getElementById("selectedBuddyLabel").innerText = `${heroNameMap[hero]} is ready. Pick a level.`;
    renderLeaderboard();
    playSound("power");
  }

  // --- Drawing functions (background, cloud, items, effects, player) --- 
  // Keep your original drawing functions here, omitted for brevity.

  function drawGame(now) {
    drawBackground(now);
    drawItems();
    drawEffects();
    drawPlayer();
  }

  function tickPowers(deltaSeconds) {
    if (!gameRunning) return;
    activeHint = Math.max(0, activeHint - deltaSeconds);
    activeMagnet = Math.max(0, activeMagnet - deltaSeconds);
    danceTimer = Math.max(0, danceTimer - deltaSeconds);
    updateUI();
  }

  function animate(now) {
    animationId = requestAnimationFrame(animate);
    const deltaSeconds = Math.min(0.05, (now - lastTime) / 1000 || 0);
    lastTime = now;
    if (gameRunning || document.getElementById("startScreen").classList.contains("hide")) {
      tickPowers(deltaSeconds);
      drawGame(now);
    }
  }

  function resizeAndPlace() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    catcherW = Math.max(92, Math.min(130, W * 0.18));
    groundY = H - Math.max(74, Math.min(98, H * 0.13));
    playerX = Math.min(W - catcherW, Math.max(0, playerX || W / 2 - catcherW / 2));
    targetX = playerX;
  }

  function handleMove(clientX) {
    if (!gameRunning) return;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (clientX - rect.left) * (W / rect.width);
    targetX = Math.min(W - catcherW, Math.max(0, canvasX - catcherW / 2));
    playerX += (targetX - playerX) * 0.45;
  }

  // Event listeners for mouse/touch
  canvas.addEventListener("mousemove", (e) => handleMove(e.clientX));
  canvas.addEventListener("touchmove", (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); }, { passive: false });
  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); }, { passive: false });

  // --- Button event handlers ---
  document.getElementById("nextSetupBtn").addEventListener("click", showSetupStep);
  document.getElementById("backBuddyBtn").addEventListener("click", () => {
    showBuddyStep();
    playSound("power");
  });
  document.getElementById("startGameBtn").addEventListener("click", () => {
    resizeAndPlace();
    startGameSession();
  });
  document.getElementById("restartGameBtn").addEventListener("click", startGameSession);
  document.getElementById("homeBtnOverlay").addEventListener("click", goHome);
  document.getElementById("quitBtn").addEventListener("click", () => {
    if (confirm("Are you sure you want to quit?")) {
      location.reload();
    }
  });

  // Initialize game
  resizeAndPlace();
  categoryStats = createCategoryStats();
  pickRandomChallenge();
  updateUI();
  renderLeaderboard();
  animationId = requestAnimationFrame(animate);
})();
</script>
</body>
</html>
