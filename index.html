<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Catch the Code — Kid's Voice Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #bfe4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Trebuchet MS", "Comic Sans MS", "Chalkboard SE", "Segoe UI", sans-serif;
            touch-action: none;
            position: fixed;
            inset: 0;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #gameCanvas {
            z-index: 10;
            cursor: none;
        }

        .ui-panel {
            position: absolute;
            inset: 0;
            z-index: 30;
            pointer-events: none;
        }

        .top-bar {
            position: absolute;
            top: max(10px, calc(var(--safe-top) + 8px));
            left: clamp(10px, 2.5vw, 24px);
            right: clamp(10px, 2.5vw, 24px);
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: clamp(8px, 2vw, 18px);
            align-items: center;
            padding: clamp(8px, 1.6vw, 12px);
            background: rgba(35, 43, 47, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 999px;
        }

        .stat {
            min-width: 0;
            height: clamp(40px, 7vw, 54px);
            background: #fff3e0;
            border-radius: 999px;
            padding: 0 clamp(10px, 3vw, 20px);
            font-weight: 800;
            font-size: clamp(1rem, 3.2vw, 1.45rem);
            color: #2d2b22;
            box-shadow: 0 5px 0 #b97f2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: "Trebuchet MS", ui-monospace, "SFMono-Regular", Menlo, monospace;
            white-space: nowrap;
        }

        .lives {
            background: #ffe0d5;
            color: #b63919;
        }

        .power-row {
            position: absolute;
            top: max(68px, calc(var(--safe-top) + 78px));
            left: clamp(10px, 2.5vw, 24px);
            right: clamp(10px, 2.5vw, 24px);
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 16px);
            pointer-events: none;
        }

        .power-chip {
            min-width: clamp(92px, 18vw, 150px);
            height: clamp(34px, 5.8vw, 48px);
            background: rgba(35, 43, 47, 0.58);
            backdrop-filter: blur(8px);
            border-radius: 999px;
            padding: 0 clamp(10px, 2vw, 18px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: clamp(0.75rem, 2.35vw, 1.05rem);
            font-weight: 800;
            color: #ffe7b2;
            border: 1px solid #e7aa65;
            opacity: 0.62;
            white-space: nowrap;
        }

        .power-chip.active {
            opacity: 1;
            background: rgba(255, 196, 92, 0.32);
            box-shadow: 0 0 14px rgba(255, 198, 112, 0.9);
            border-color: #ffcf8a;
        }

        .category-panel {
            position: absolute;
            top: max(120px, calc(var(--safe-top) + 132px));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: min(92vw, 620px);
            background: rgba(30, 39, 45, 0.7);
            color: #fff0bc;
            border-radius: 999px;
            padding: 7px 14px;
            font-weight: 900;
            font-size: clamp(0.72rem, 2.2vw, 0.94rem);
            backdrop-filter: blur(8px);
        }

        .mini-meter {
            width: clamp(60px, 14vw, 110px);
            height: 9px;
            background: #2e2c4a;
            border-radius: 999px;
            overflow: hidden;
        }

        .mini-meter div {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8ee6d1, #ffe081);
            border-radius: 999px;
            transition: width 0.2s ease;
        }

        .progress-area {
            position: absolute;
            left: clamp(12px, 2.5vw, 26px);
            right: clamp(12px, 2.5vw, 26px);
            bottom: max(10px, calc(var(--safe-bottom) + 12px));
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: clamp(8px, 1.8vw, 12px) clamp(12px, 2.4vw, 20px);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: #fff0bc;
            font-weight: 900;
            font-size: clamp(0.78rem, 2.4vw, 1rem);
        }

        .progress-bg {
            background: #2e2c4a;
            border-radius: 999px;
            height: clamp(12px, 2.5vw, 18px);
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffe081, #ff9f55);
            border-radius: 999px;
            transition: width 0.2s ease;
        }

        .toast-magic {
            position: absolute;
            top: max(166px, calc(var(--safe-top) + 172px));
            left: 50%;
            transform: translateX(-50%);
            background: #f9e45b;
            color: #2f2a1f;
            font-weight: 900;
            padding: 8px 18px;
            border-radius: 999px;
            z-index: 40;
            pointer-events: none;
            opacity: 0;
            transition: 0.2s;
            white-space: nowrap;
        }

        .start-screen {
            position: absolute;
            inset: 0;
            background: linear-gradient(150deg, #28518d 0%, #11254c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: 0.35s ease;
            padding: 20px;
        }

        .start-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .start-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 28px 20px;
            width: min(94vw, 560px);
            text-align: center;
            color: #ffefb9;
        }

        .game-title {
            font-size: clamp(2rem, 7vw, 3.2rem);
            text-shadow: 0 5px 0 #402e1a;
        }

        .hero-pick {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .hero-card {
            background: #fff2bf;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            width: 110px;
            transition: 0.1s;
            border: 3px solid transparent;
        }

        .hero-card.selected {
            border-color: #ffd966;
            background: #fff3cc;
            transform: scale(1.02);
        }

        .hero-emoji {
            font-size: 3.5rem;
        }

        .difficulty-pick {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 18px 0;
        }

        .difficulty-card {
            background: #ffefcf;
            padding: 10px;
            border-radius: 32px;
            width: 100px;
            cursor: pointer;
            font-weight: bold;
            color: #2e241a;
        }

        .difficulty-card.selected {
            background: #ffcf8a;
            box-shadow: 0 0 0 2px gold;
        }

        .play-btn {
            background: #ffb347;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 80px;
            margin: 15px 0;
            cursor: pointer;
            box-shadow: 0 6px 0 #a1551a;
            transition: 0.05s linear;
        }

        .play-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #a1551a;
        }

        .gameover-panel {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }

        .gameover-panel.show {
            opacity: 1;
            pointer-events: all;
        }

        .over-card {
            background: #ffefcf;
            border-radius: 48px;
            padding: 28px;
            text-align: center;
            width: 280px;
        }

        .restart-btn {
            background: #ff9f4b;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 22px;
            border-radius: 40px;
            margin-top: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>
<div class="ui-panel">
    <div class="top-bar">
        <div class="stat">⭐ <span id="scoreValue">0</span></div>
        <div class="stat">❤️ <span id="livesValue">5</span></div>
        <div class="stat">⚡ <span id="streakValue">0</span></div>
        <div class="stat">🎯 <span id="catchCount">0</span></div>
    </div>
    <div class="power-row">
        <div class="power-chip" id="powerHint">💡 HINT</div>
        <div class="power-chip" id="powerShield">🛡️ SHIELD</div>
    </div>
    <div class="category-panel">
        <span>📘 <span id="topicName">Basics</span></span>
        <div class="mini-meter"><div id="topicProgress" style="width: 0%;"></div></div>
    </div>
    <div class="progress-area">
        <div class="progress-label">🌟 STAR POWER 🌟 <span id="starCountText">0/6</span></div>
        <div class="progress-bg"><div class="progress-fill" id="starFillGlobal" style="width: 0%;"></div></div>
    </div>
    <div class="toast-magic" id="toastMsg">✨</div>
</div>

<div class="start-screen" id="startScreen">
    <div class="start-card">
        <div class="game-title">✨ CATCH THE CODE ✨</div>
        <div class="hero-pick" id="heroSelect">
            <div class="hero-card selected" data-hero="🧙‍♂️"><div class="hero-emoji">🧙‍♂️</div><div>Wizard</div></div>
            <div class="hero-card" data-hero="🐱"><div class="hero-emoji">🐱</div><div>Kitty</div></div>
            <div class="hero-card" data-hero="🤖"><div class="hero-emoji">🤖</div><div>Robot</div></div>
        </div>
        <div class="difficulty-pick">
            <div class="difficulty-card selected" data-diff="easy">🌟 EASY</div>
            <div class="difficulty-card" data-diff="medium">⚡ MEDIUM</div>
            <div class="difficulty-card" data-diff="hard">🔥 HARD</div>
        </div>
        <button class="play-btn" id="startGameBtn">🎮 PLAY NOW 🎮</button>
        <div style="font-size:0.8rem; margin-top:8px;">🎤 Kid's voice feedback — cheers, tips & giggles!</div>
    </div>
</div>

<div class="gameover-panel" id="gameoverPanel">
    <div class="over-card">
        <div>🏆</div>
        <h2 id="gameoverMsg">GAME OVER</h2>
        <p id="finalScoreMsg">Your score: 0</p>
        <button class="restart-btn" id="restartGameBtn">🔄 PLAY AGAIN</button>
    </div>
</div>

<script>
    // ================= 🎤 KID VOICE SYSTEM (exactly as requested) =================
    function kidSpeak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = "en-US";
        speech.rate = 0.92;
        speech.pitch = 1.65;   // higher = cartoon kid voice
        speech.volume = 1;
        const voices = window.speechSynthesis.getVoices();
        const kidVoice = voices.find(v => v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("child") || v.name.toLowerCase().includes("samantha"));
        if (kidVoice) speech.voice = kidVoice;
        window.speechSynthesis.speak(speech);
    }

    const voiceLines = {
        correct: ["Yaaay! You got it!", "Awesome job!", "Woohoo! Correct!", "You're a coding star!", "Hurray! Nice catch!"],
        wrong: ["Oh noooo! Try again!", "Oopsie! Don't be sad, try again!", "You got this! Next time!", "Hmm, not quite! Keep going!"],
        win: ["Hurray! You win superstar!", "You did it! Amazing!", "Victory! So proud of you!"],
        start: ["Let's go coder!", "Ready to catch some code? Have fun!", "Game starting! Woo-hoo!"],
        streak: ["You're on fire!", "Amazing streak! Keep it up!", "Woohoo! Super coder!"],
        shield: ["Shield active! You're safe!", "Protection on! Nice!"],
        powerup: ["Hint ready! Let’s find the right code!"],
        levelUp: ["Level up! You rock!", "New challenge! You got this!"]
    };
    function speakRandom(type) {
        const arr = voiceLines[type];
        if (arr && arr.length) {
            const msg = arr[Math.floor(Math.random() * arr.length)];
            kidSpeak(msg);
        }
    }

    // ================= GAME STATE =================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let gameRunning = false;
    let animationId = null;

    let player = { x: 0, y: 0, radius: 28 };
    let items = [];
    let score = 0, lives = 5, streak = 0, catched = 0, starsCollected = 0, maxStars = 6;
    let difficulty = 'easy';
    let currentTopic = "Basics";
    let topicLevel = 1;
    let topicProgress = 0;
    let shieldActive = false;
    let hintActive = false;
    let hintTargetIndex = -1;

    // speed & spawn
    let baseSpeed = 2.4;
    let spawnInterval = 70;
    let framesSinceSpawn = 0;

    // coding snippets (right = correct, wrong = bug)
    const codeBank = {
        Basics: [
            { text: "let x = 5;", correct: true, explanation: "✓ variable declared!" },
            { text: "x = 5; (missing let)", correct: false, explanation: "⚠️ missing 'let' or 'var'" },
            { text: "print('hello')", correct: true, explanation: "✓ prints message" },
            { text: "prnt('hello')", correct: false, explanation: "❌ typo: print" },
            { text: "if (x > 0) { }", correct: true, explanation: "✓ valid if statement" },
            { text: "if x > 0 { }", correct: false, explanation: "❌ missing parentheses" }
        ],
        Loops: [
            { text: "for(let i=0;i<3;i++)", correct: true, explanation: "✓ loop works" },
            { text: "for i in range(3)", correct: false, explanation: "❌ JS needs for(let..)" },
            { text: "while(x<5){x++;}", correct: true, explanation: "✓ valid while" },
            { text: "whlie(x<5)", correct: false, explanation: "❌ typo: while" }
        ],
        Functions: [
            { text: "function add(a,b){return a+b;}", correct: true, explanation: "✓ function defined" },
            { text: "function add(a,b) return a+b;", correct: false, explanation: "❌ missing braces" }
        ]
    };

    function getCurrentQuestions() {
        let topicData = codeBank[currentTopic] || codeBank.Basics;
        return topicData;
    }

    function spawnItem() {
        if (!gameRunning) return;
        const qSet = getCurrentQuestions();
        if (qSet.length === 0) return;
        const rand = Math.floor(Math.random() * qSet.length);
        const q = qSet[rand];
        const isCorrect = q.correct;
        const side = Math.random() < 0.5 ? -1 : 1;
        let x = (width / 2) + (side * (width / 2.5)) + (Math.random() * 80 - 40);
        x = Math.min(width - 55, Math.max(55, x));
        items.push({
            x: x, y: 65, radius: 28,
            text: q.text.length > 22 ? q.text.slice(0, 20) + ".." : q.text,
            fullText: q.text,
            correct: isCorrect,
            explanation: q.explanation,
            speedY: baseSpeed + (difficulty === 'hard' ? 1.2 : (difficulty === 'medium' ? 0.5 : 0))
        });
    }

    function applyCorrect() {
        score += 10;
        streak++;
        catched++;
        starsCollected = Math.min(maxStars, starsCollected + 1);
        updateUI();
        playEffect("correct");
        speakRandom("correct");
        if (streak >= 3) {
            speakRandom("streak");
        }
        if (starsCollected >= maxStars) {
            levelUpTopic();
        }
        showToast("✔️ Nice! +10");
    }

    function applyWrong() {
        if (shieldActive) {
            shieldActive = false;
            document.getElementById("powerShield").classList.remove("active");
            showToast("🛡️ Shield saved you!");
            kidSpeak("Phew! Shield protected you!");
            return;
        }
        lives--;
        streak = 0;
        updateUI();
        playEffect("wrong");
        speakRandom("wrong");
        showToast("❌ Oops! " + (lives > 0 ? "Keep trying!" : "Game over!"));
        if (lives <= 0) {
            gameOver(false);
        }
    }

    function levelUpTopic() {
        const topics = Object.keys(codeBank);
        let idx = topics.indexOf(currentTopic);
        if (idx + 1 < topics.length) {
            currentTopic = topics[idx + 1];
            starsCollected = 0;
            topicLevel++;
            updateUI();
            showToast(`✨ ${currentTopic} UNLOCKED! ✨`);
            kidSpeak(`Woohoo! New topic: ${currentTopic}! You're awesome!`);
            speakRandom("levelUp");
        } else {
            gameOver(true);
        }
        updateTopicUI();
    }

    function gameOver(won) {
        if (!gameRunning) return;
        gameRunning = false;
        if (won) {
            speakRandom("win");
            document.getElementById("gameoverMsg").innerText = "🏆 YOU WIN! 🏆";
            document.getElementById("finalScoreMsg").innerText = `Score: ${score} | Catches: ${catched}`;
        } else {
            document.getElementById("gameoverMsg").innerText = "💔 GAME OVER 💔";
            document.getElementById("finalScoreMsg").innerText = `Final Score: ${score}`;
        }
        document.getElementById("gameoverPanel").classList.add("show");
        if (animationId) cancelAnimationFrame(animationId);
    }

    function updateUI() {
        document.getElementById("scoreValue").innerText = score;
        document.getElementById("livesValue").innerText = lives;
        document.getElementById("streakValue").innerText = streak;
        document.getElementById("catchCount").innerText = catched;
        document.getElementById("starCountText").innerText = `${starsCollected}/${maxStars}`;
        let starPercent = (starsCollected / maxStars) * 100;
        document.getElementById("starFillGlobal").style.width = starPercent + "%";
        document.getElementById("topicName").innerText = currentTopic;
        let topicPercent = (topicLevel % Object.keys(codeBank).length) / Object.keys(codeBank).length * 100;
        document.getElementById("topicProgress").style.width = (topicPercent || 0) + "%";
    }
    function updateTopicUI() {
        let topicPercent = (starsCollected / maxStars) * 100;
        document.getElementById("starFillGlobal").style.width = topicPercent + "%";
        document.getElementById("topicName").innerText = currentTopic;
    }

    function showToast(msg) {
        const toast = document.getElementById("toastMsg");
        toast.innerText = msg;
        toast.style.opacity = "1";
        toast.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => { toast.style.opacity = "0"; }, 1000);
    }

    function playEffect(type) {
        // optional simple beep, but voice is enough
    }

    function resetGame() {
        score = 0; lives = difficulty === 'easy' ? 5 : (difficulty === 'medium' ? 3 : 2);
        streak = 0; catched = 0; starsCollected = 0;
        items = [];
        currentTopic = "Basics";
        topicLevel = 1;
        shieldActive = false; hintActive = false;
        updateUI();
        updateTopicUI();
        gameRunning = true;
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
        speakRandom("start");
    }

    function handleCollisions() {
        for (let i = items.length-1; i >= 0; i--) {
            const item = items[i];
            item.y += item.speedY;
            const dx = player.x - item.x;
            const dy = player.y - item.y;
            const dist = Math.hypot(dx, dy);
            if (dist < player.radius + item.radius) {
                if (item.correct) applyCorrect();
                else applyWrong();
                items.splice(i,1);
            } else if (item.y > height + 80) {
                items.splice(i,1);
            }
        }
    }

    function updateSpawn() {
        if (!gameRunning) return;
        framesSinceSpawn++;
        let interval = (difficulty === 'easy') ? 45 : (difficulty === 'medium' ? 32 : 24);
        if (framesSinceSpawn >= interval) {
            framesSinceSpawn = 0;
            spawnItem();
            if (difficulty === 'hard' && Math.random()<0.3) spawnItem();
        }
    }

    function applyHint() {
        if (!gameRunning) return;
        if (hintActive) return;
        hintActive = true;
        let candidates = items.filter(i => i.correct === true);
        if (candidates.length) {
            hintTargetIndex = items.indexOf(candidates[0]);
            showToast("💡 Hint: Look for the glowing code!");
            kidSpeak("Hint! Catch the shiny correct code!");
            setTimeout(() => { hintActive = false; hintTargetIndex = -1; }, 3000);
        } else {
            kidSpeak("No code right now, wait a bit!");
            setTimeout(()=>{ hintActive=false;}, 500);
        }
    }

    function activateShield() {
        if (!gameRunning) return;
        if (shieldActive) {
            showToast("Shield already active!");
            return;
        }
        shieldActive = true;
        document.getElementById("powerShield").classList.add("active");
        kidSpeak("Shield activated! You're protected!");
        setTimeout(() => {
            shieldActive = false;
            document.getElementById("powerShield").classList.remove("active");
        }, 7000);
    }

    // Drawing routines
    function draw() {
        ctx.clearRect(0, 0, width, height);
        // gradient background
        let grad = ctx.createLinearGradient(0,0,0,height);
        grad.addColorStop(0,"#c7e9fb");
        grad.addColorStop(1,"#e0f2fe");
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,width,height);
        // player
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
        ctx.fillStyle = "#ffdb7e";
        ctx.fill();
        ctx.strokeStyle = "#bb8822";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.font = "28px 'Segoe UI Emoji'";
        ctx.fillStyle = "#3a2a12";
        ctx.fillText(document.querySelector(".hero-card.selected")?.dataset.hero || "🧙‍♂️", player.x-18, player.y+12);
        // items
        for(let i=0;i<items.length;i++){
            const it = items[i];
            ctx.beginPath();
            ctx.arc(it.x, it.y, it.radius, 0, Math.PI*2);
            ctx.fillStyle = it.correct ? "#b5e3b5" : "#ffbcb0";
            ctx.fill();
            ctx.strokeStyle = "#886633";
            ctx.lineWidth = 2;
            ctx.stroke();
            if (hintActive && hintTargetIndex === i) {
                ctx.beginPath();
                ctx.arc(it.x, it.y, it.radius+6, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,235,100,0.5)";
                ctx.fill();
            }
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#1f2f2a";
            ctx.fillText(it.text.length>12?it.text.slice(0,12)+"..":it.text, it.x-24, it.y+5);
            // small icon
            ctx.font = "18px emoji";
            ctx.fillStyle = it.correct ? "#2c6e2c" : "#a13e2c";
            ctx.fillText(it.correct ? "✓" : "🐞", it.x+18, it.y-12);
        }
        // shield indicator
        if(shieldActive){
            ctx.font = "bold 24px sans-serif";
            ctx.fillStyle = "#88ffee";
            ctx.shadowBlur=8;
            ctx.fillText("🛡️ SHIELD", player.x-35, player.y-32);
            ctx.shadowBlur=0;
        }
    }

    let mouseX = width/2;
    function handleMove(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX;
        if (e.touches) clientX = e.touches[0].clientX;
        else clientX = e.clientX;
        let canvasX = (clientX - rect.left) * (width / rect.width);
        player.x = Math.min(width - player.radius, Math.max(player.radius, canvasX));
    }

    function gameLoop() {
        if (!gameRunning) return;
        updateSpawn();
        handleCollisions();
        draw();
        if (lives <= 0) gameOver(false);
        animationId = requestAnimationFrame(gameLoop);
    }

    function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        player.x = width/2;
        player.y = height - 58;
        player.radius = 32;
    }

    window.addEventListener('resize', () => { initCanvas(); draw(); });
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); });
    canvas.addEventListener('touchstart', (e) => e.preventDefault());

    document.getElementById("powerHint").addEventListener("click", () => applyHint());
    document.getElementById("powerShield").addEventListener("click", () => activateShield());
    document.getElementById("startGameBtn").addEventListener("click", () => {
        const selectedHero = document.querySelector(".hero-card.selected")?.dataset.hero || "🧙‍♂️";
        const selectedDiff = document.querySelector(".difficulty-card.selected")?.dataset.diff || "easy";
        difficulty = selectedDiff;
        resetGame();
        document.getElementById("startScreen").classList.add("hide");
        gameRunning = true;
        initCanvas();
        animationId = requestAnimationFrame(gameLoop);
    });
    document.getElementById("restartGameBtn").addEventListener("click", () => {
        document.getElementById("gameoverPanel").classList.remove("show");
        document.getElementById("startScreen").classList.remove("hide");
        gameRunning = false;
        if(animationId) cancelAnimationFrame(animationId);
    });
    document.querySelectorAll(".hero-card").forEach(card => {
        card.addEventListener("click", () => {
            document.querySelectorAll(".hero-card").forEach(c=>c.classList.remove("selected"));
            card.classList.add("selected");
        });
    });
    document.querySelectorAll(".difficulty-card").forEach(diff => {
        diff.addEventListener("click", () => {
            document.querySelectorAll(".difficulty-card").forEach(d=>d.classList.remove("selected"));
            diff.classList.add("selected");
        });
    });
    initCanvas();
    draw();
    // populate voices after load
    window.speechSynthesis?.getVoices();
</script>
</body>
</html>
