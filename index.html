<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Stars</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
text-align:center;
}

#home{
padding:30px;
}

#openLink{
font-size:24px;
font-weight:bold;
color:white;
background:gold;
padding:14px 24px;
border-radius:10px;
text-decoration:none;
display:inline-block;
cursor:pointer;
}

#gameBox{
margin-top:20px;
}

/* game area */
#game{
position:relative;
width:100%;
height:700px;
overflow:hidden;
background:linear-gradient(to bottom,#000428,#001a66,#000000);
outline:none;
cursor:pointer;
}

/* title */
#title{
position:absolute;
top:15px;
width:100%;
text-align:center;
font-size:42px;
font-weight:bold;
color:gold;
text-shadow:0 0 12px gold;
}

/* score */
#score{
position:absolute;
top:20px;
left:20px;
font-size:26px;
font-weight:bold;
z-index:5;
}

/* moon */
#moon{
position:absolute;
top:70px;
right:80px;
width:80px;
height:80px;
border-radius:50%;
background:#fff2aa;
box-shadow:0 0 25px #fff2aa;
}

/* tiny stars */
.sky{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
}

/* falling stars */
.star{
position:absolute;
font-size:34px;
filter:drop-shadow(0 0 8px gold);
}

/* tray */
#tray{
position:absolute;
bottom:130px;
left:300px;
width:140px;
height:16px;
background:gold;
border-radius:20px;
box-shadow:0 0 15px gold;
}

/* girl */
#girl{
position:absolute;
bottom:0;
left:320px;
font-size:120px;
}

/* message */
#msg{
position:absolute;
top:300px;
width:100%;
text-align:center;
font-size:50px;
font-weight:bold;
display:none;
}
</style>
</head>

<body>

<div id="home">
<h2>⭐ Catch The Stars</h2>

<a href="#" id="openLink">▶ Open Game</a>

<div id="gameBox"></div>
</div>

<script>
document.getElementById("openLink").addEventListener("click", function(e){
e.preventDefault();
openGame();
});

function openGame(){

const box=document.getElementById("gameBox");

box.innerHTML=`
<div id="game" tabindex="0">
<div id="title">CATCH THE STARS</div>
<div id="score">Score: 0</div>
<div id="moon"></div>
<div id="tray"></div>
<div id="girl">👧</div>
<div id="msg"></div>
</div>
`;

const game=document.getElementById("game");
const tray=document.getElementById("tray");
const girl=document.getElementById("girl");
const scoreBox=document.getElementById("score");
const msg=document.getElementById("msg");

let x=300;
let score=0;
let lives=3;
let playing=true;

/* focus keyboard */
game.focus();

/* background stars */
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="sky";
s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*700+"px";
game.appendChild(s);
}

/* move player */
function movePlayer(newX){

x=newX;

if(x<0) x=0;
if(x>window.innerWidth-160) x=window.innerWidth-160;

tray.style.left=x+"px";
girl.style.left=(x+15)+"px";
}

/* keyboard */
game.addEventListener("keydown",function(e){

if(!playing) return;

if(e.key==="ArrowLeft") movePlayer(x-35);
if(e.key==="ArrowRight") movePlayer(x+35);

});

/* mouse move */
game.addEventListener("mousemove",function(e){

if(!playing) return;

const rect=game.getBoundingClientRect();
movePlayer(e.clientX-rect.left-70);

});

/* falling stars */
function makeStar(){

if(!playing) return;

let star=document.createElement("div");
star.className="star";
star.innerHTML="⭐";

let sx=Math.random()*(window.innerWidth-50);
let sy=-30;

star.style.left=sx+"px";
star.style.top=sy+"px";

game.appendChild(star);

let drop=setInterval(function(){

sy+=5;
star.style.top=sy+"px";

/* catch */
if(sy>530 && sx>x-30 && sx<x+140){

score++;
scoreBox.innerHTML="Score: "+score;

star.remove();
clearInterval(drop);

if(score>=15){
winGame();
}
}

/* miss */
if(sy>700){

lives--;

star.remove();
clearInterval(drop);

if(lives<=0){
loseGame();
}

}

},25);
}

setInterval(makeStar,700);

function winGame(){
playing=false;
msg.style.display="block";
msg.innerHTML="🎉 YOU WIN!";
}

function loseGame(){
playing=false;
msg.style.display="block";
msg.innerHTML="💀 GAME OVER";
}

}
</script>

</body>
</html>
