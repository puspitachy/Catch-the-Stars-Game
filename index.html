<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CodeVerse – Save the Sky</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#09102a;
  --bg2:#1c2a66;
  --bg3:#ff8c42;
  --gold:#ffe566;
  --panel:rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#09102a;font-family:'Nunito',sans-serif;color:#fff;user-select:none;touch-action:none;}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:20;transition:opacity .35s,transform .35s;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.96);}
#homeScreen{
  background:linear-gradient(180deg,#08102f 0%,#20256d 40%,#ff7043 100%);
  padding:20px 16px;
  justify-content:flex-start;
  overflow:auto;
}
.title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2.2rem,6vw,4.8rem);
  color:var(--gold);
  text-align:center;
  line-height:1.05;
  text-shadow:0 0 24px #ffe56688,0 0 60px #ff990055;
  margin-top:10px;
}
.subtitle{
  font-family:'Fredoka One',cursive;
  color:#cde2ff;
  font-size:clamp(.9rem,3vw,1.2rem);
  margin:10px 0 20px;
  text-align:center;
}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:8px 0 16px;}
.pill,.choice,.world{
  border-radius:18px;
  border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.07);
  color:#d9e6ff;
  cursor:pointer;
  text-align:center;
  transition:transform .18s,border-color .18s,box-shadow .18s;
}
.pill:hover,.choice:hover,.world:hover,.sel{transform:scale(1.06);border-color:var(--gold);box-shadow:0 0 18px #ffe56644;}
.choice{min-width:84px;padding:12px 14px;font-size:2.6rem;line-height:1;}
.choice .lbl,.world .lbl,.pill .lbl{display:block;font-family:'Fredoka One',cursive;font-size:.74rem;margin-top:4px;color:#cde2ff;}
.world{padding:10px 14px;min-width:112px;font-family:'Fredoka One',cursive;font-size:.9rem;}
.world .ico{display:block;font-size:1.6rem;margin-bottom:4px;}
.pill{padding:12px 16px;font-family:'Fredoka One',cursive;font-size:.95rem;min-width:110px;}
.btn{
  font-family:'Fredoka One',cursive;
  border:none;
  cursor:pointer;
  border-radius:999px;
  padding:14px 34px;
  font-size:1.2rem;
  color:#1a0a3e;
  background:linear-gradient(135deg,#ffe566,#ffb000);
  box-shadow:0 8px 26px #ff990066;
}
.btn:active{transform:translateY(1px) scale(.99);}
#hud{
  position:fixed;top:0;left:0;right:0;z-index:30;
  display:none;justify-content:space-between;align-items:center;
  padding:10px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);
  pointer-events:none;
}
.hudBox{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hudVal{font-family:'Fredoka One',cursive;color:var(--gold);font-size:clamp(1.2rem,4vw,2rem);line-height:1;text-shadow:0 0 10px #ffe56688;}
.hudLbl{font-size:.62rem;letter-spacing:2px;color:#b6ccff;text-transform:uppercase;}
#combo{display:none;color:#ff88ff;font-family:'Fredoka One',cursive;font-size:1rem;text-shadow:0 0 12px #ff88ff88;}
#combo.show{display:block;}
#coinDisplay{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:31;display:none;
  font-family:'Fredoka One',cursive;font-size:1rem;
  color:#ffd700;background:rgba(0,0,0,.35);
  padding:5px 12px;border-radius:999px;border:1px solid #ffd70055;
  pointer-events:none;
}
#powerBar{
  position:fixed;bottom:54px;left:50%;transform:translateX(-50%);
  z-index:31;display:none;gap:10px;pointer-events:none;
}
.pw{
  font-size:1.35rem;padding:6px 10px;border-radius:12px;background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.2);opacity:.35;position:relative;
}
.pw.active{opacity:1;box-shadow:0 0 16px #ffe56655;animation:glow 1s infinite ease-in-out;}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(255,229,102,0);}50%{box-shadow:0 0 16px rgba(255,229,102,.6);}}
.timer{position:absolute;bottom:2px;right:4px;font-size:.58rem;font-family:'Fredoka One',cursive;color:#ffe566;}
#progressWrap{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  z-index:31;display:none;width:min(420px,84vw);text-align:center;pointer-events:none;
}
#progressLbl{font-family:'Fredoka One',cursive;font-size:.75rem;color:#cde2ff;letter-spacing:2px;margin-bottom:4px;}
#progressBg{height:12px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;border:1px solid rgba(255,255,255,.2);}
#progressFill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#ffe566,#ff9900);box-shadow:0 0 10px #ffe56666;transition:width .25s;}
#missionToast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-18px);
  z-index:35;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  background:linear-gradient(135deg,rgba(40,0,80,.92),rgba(80,0,160,.92));
  border:2px solid #ffe56666;border-radius:16px;padding:10px 20px;
  font-family:'Fredoka One',cursive;color:#ffe566;text-align:center;
}
#missionToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#overlay{
  position:fixed;inset:0;z-index:40;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:rgba(8,8,25,.86);backdrop-filter:blur(10px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#overlay.show{opacity:1;pointer-events:all;}
.ovEmoji{font-size:4rem;animation:pop .35s cubic-bezier(.2,.95,.25,1);}
@keyframes pop{0%{transform:scale(.1);}100%{transform:scale(1);}}
.ovTitle{font-family:'Fredoka One',cursive;font-size:clamp(2rem,6vw,3.6rem);margin:8px 0 6px;}
.ovScore{font-family:'Fredoka One',cursive;color:#ffe566;font-size:1.35rem;margin-bottom:8px;}
.ovSub{color:#c8d7ff;text-align:center;max-width:520px;line-height:1.7;padding:0 18px;margin-bottom:18px;font-weight:700;}
.ovBtns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btnAlt{
  font-family:'Fredoka One',cursive;border:none;border-radius:999px;padding:12px 24px;cursor:pointer;
  font-size:1rem;color:#cde2ff;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
}
#gameTip{
  position:fixed;top:120px;left:50%;transform:translateX(-50%);
  z-index:34;pointer-events:none;opacity:0;transition:opacity .2s;
  font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;background:rgba(0,0,0,.35);
  padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.18);
}
#gameTip.show{opacity:1;}
@media(max-width:520px){
  .choice{min-width:72px;font-size:2.2rem;padding:10px 12px;}
  .world{min-width:96px;font-size:.8rem;padding:9px 12px;}
  .btn{font-size:1rem;padding:12px 26px;}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="canvas"></canvas>

<div id="homeScreen" class="screen">
  <div class="title">🌤️ CodeVerse<br>Save the Sky</div>
  <div class="subtitle">Fix stars, solve code, and brighten the sky</div>

  <div style="font-family:'Fredoka One',cursive;letter-spacing:2px;font-size:.8rem;color:#b6ccff;">CHOOSE YOUR HERO</div>
  <div class="row" id="heroRow">
    <div class="choice sel" data-hero="kid" onclick="pickHero(this)">🧒<span class="lbl">Kid</span></div>
    <div class="choice" data-hero="robot" onclick="pickHero(this)">🤖<span class="lbl">Robot</span></div>
    <div class="choice" data-hero="cat" onclick="pickHero(this)">🐱<span class="lbl">Cat</span></div>
  </div>

  <div style="font-family:'Fredoka One',cursive;letter-spacing:2px;font-size:.8rem;color:#b6ccff;">CHOOSE MODE</div>
  <div class="row" id="modeRow">
    <div class="pill sel" data-mode="beginner" onclick="pickMode(this)">Beginner<span class="lbl">Kids</span></div>
    <div class="pill" data-mode="medium" onclick="pickMode(this)">Medium<span class="lbl">Teens</span></div>
    <div class="pill" data-mode="advanced" onclick="pickMode(this)">Advanced<span class="lbl">Adults</span></div>
  </div>

  <div style="font-family:'Fredoka One',cursive;letter-spacing:2px;font-size:.8rem;color:#b6ccff;">CHOOSE WORLD</div>
  <div class="row" id="worldRow">
    <div class="world sel" data-world="sky" onclick="pickWorld(this)"><span class="ico">🌈</span>Sky</div>
    <div class="world" data-world="space" onclick="pickWorld(this)"><span class="ico">🚀</span>Space</div>
    <div class="world" data-world="galaxy" onclick="pickWorld(this)"><span class="ico">🌌</span>Galaxy</div>
  </div>

  <button class="btn" id="playBtn" type="button">▶ Start Adventure</button>
  <div style="margin-top:14px;color:#7f95bf;font-size:.78rem;">🖱 Mouse · ⌨ Keyboard · 📱 Touch</div>
</div>

<div id="hud">
  <div class="hudBox"><div class="hudVal" id="scoreVal">0</div><div class="hudLbl">Score</div></div>
  <div class="hudBox">
    <div id="livesVal" class="hudVal">❤️❤️❤️</div>
    <div id="combo">COMBO x1</div>
  </div>
  <div class="hudBox"><div class="hudVal" id="levelVal">1</div><div class="hudLbl">Level</div></div>
</div>
<div id="coinDisplay">🪙 <span id="coinVal">0</span></div>

<div id="powerBar">
  <div class="pw" id="pwHint">💡<span class="timer" id="pwHintT"></span></div>
  <div class="pw" id="pwFreeze">⏸️<span class="timer" id="pwFreezeT"></span></div>
  <div class="pw" id="pwShield">🛡️<span class="timer" id="pwShieldT"></span></div>
</div>

<div id="progressWrap">
  <div id="progressLbl">RESTORE THE SKY</div>
  <div id="progressBg"><div id="progressFill"></div></div>
</div>

<div id="gameTip"></div>
<div id="missionToast"></div>

<div id="overlay">
  <div class="ovEmoji" id="ovEmoji"></div>
  <div class="ovTitle" id="ovTitle"></div>
  <div class="ovScore" id="ovScore"></div>
  <div class="ovSub" id="ovSub"></div>
  <div class="ovBtns">
    <button class="btn" id="againBtn" type="button">🔄 Play Again</button>
    <button class="btnAlt" id="homeBtn" type="button">🏠 Home</button>
  </div>
</div>

<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t='sine',d=.12,v=.12,del=0){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.setValueAtTime(f,AC.currentTime+del);
    g.gain.setValueAtTime(v,AC.currentTime+del);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+del+d);
    o.start(AC.currentTime+del);o.stop(AC.currentTime+del+d);
  }catch{}
}
function sfxGood(){tone(660,'sine',.12,.14);tone(880,'sine',.1,.12,.06);}
function sfxBad(){tone(180,'sawtooth',.18,.18);tone(120,'square',.16,.12,.06);}
function sfxPower(){[440,554,659,880].forEach((f,i)=>tone(f,'sine',.15,.12,i*.05));}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',.18,.14,i*.09));}
function sfxClick(){tone(720,'sine',.06,.12);tone(980,'sine',.05,.09,.03);}
document.addEventListener('pointerdown',()=>AC.state==='suspended'&&AC.resume(),{once:true});

const HEROES={
  kid:{emoji:'🧒',happy:'😄',sad:'😢'},
  robot:{emoji:'🤖',happy:'🤩',sad:'😕'},
  cat:{emoji:'🐱',happy:'😻',sad:'😿'}
};
const WORLDS={
  sky:{sky:['#08102f','#1e2d72','#6d2f8f','#ff8a4c'],ground:'#16406b',accent:'#2d68b8',star:'rgba(240,245,255,',tray1:'#ffe97a',tray2:'#e6a800',trayGlow:'#ffe566',clouds:true},
  space:{sky:['#00010a','#040817','#070d25','#0b1334'],ground:'#081126',accent:'#1a3368',star:'rgba(170,160,255,',tray1:'#93b3ff',tray2:'#3556cc',trayGlow:'#93b3ff',clouds:false},
  galaxy:{sky:['#050012','#12002e','#24005c','#3b008b'],ground:'#12002e',accent:'#4d0f91',star:'rgba(255,180,255,',tray1:'#ff8cff',tray2:'#ab00d4',trayGlow:'#ff8cff',clouds:false}
};
const MODES={
  beginner:{name:'Beginner',speed:1.55,spawn:1200,answerTime:0,choices:3,tip:'Tap the correct answer'},
  medium:{name:'Medium',speed:2.15,spawn:950,answerTime:5,choices:4,tip:'Choose the right code quickly'},
  advanced:{name:'Advanced',speed:2.7,spawn:820,answerTime:7,choices:4,tip:'Fix broken code blocks'}
};
const CHALLENGES={
  beginner:[
    {q:'Fix the missing bracket: (', a:' )', bad:['[',']']},
    {q:'Choose the correct pair for function call', a:'()', bad:['{}','[]']},
    {q:'Select the right quote mark', a:'"', bad:["'",'`']},
    {q:'Which closes a block?', a:'}', bad:[')',']']}
  ],
  medium:[
    {q:'Choose correct Python loop', a:'for i in range(5)', bad:['for i range 5','for i in 5']},
    {q:'Choose correct if statement', a:'if score > 10:', bad:['if score > 10','if(score > 10)']},
    {q:'Choose correct print line', a:'print("Hi")', bad:['print Hi','echo("Hi")']},
    {q:'Choose correct variable', a:'score = 0', bad:['score == 0','score => 0']}
  ],
  advanced:[
    {q:'Fix the loop header', a:'for i in range(5):', bad:['for i in range(5)','for i range(5):']},
    {q:'Fix the function header', a:'def hello():', bad:['def hello()', 'function hello():']},
    {q:'Fix the list syntax', a:'items = [1, 2, 3]', bad:['items = (1, 2, 3)','items = {1, 2, 3}']},
    {q:'Fix the condition', a:'if score >= 10:', bad:['if score = 10:', 'if score >== 10:']}
  ]
};
const POWERUPS=[
  {type:'hint',emoji:'💡',name:'Hint'},
  {type:'freeze',emoji:'⏸️',name:'Freeze'},
  {type:'shield',emoji:'🛡️',name:'Shield'}
];

let hero='kid',mode='beginner',world='sky';
let gameRunning=false,paused=false;
let W=innerWidth,H=innerHeight,dpr=1;
let bgCv=document.getElementById('bg'),bgCtx=bgCv.getContext('2d');
let cv=document.getElementById('canvas'),ctx=cv.getContext('2d');

let score=0,level=1,coins=0,lives=3,combo=0,streak=0,correct=0,wrong=0;
let starsFixed=0,starsForLevel=5,timeNoMistake=0,timeSurvive=0;
let missionDone={};
let items=[],particles=[],floaters=[],stars=[],clouds=[];
let activePower={hint:0,freeze:0,shield:0};
let spawnTimer=null,freezeTimer=0,shieldTimer=0,hintTimer=0;
let selectedAnswer=null,draggingId=null;
let currentPrompt=null,currentChoices=[];
let inputMode='tap';
let pointerX=0,pointerY=0;
let playerX=0,playerTargetX=0,playerBob=0;
let trayW=150,trayH=18,groundY=0,shake=0,frame=0;
let currentQuestion=null,questionTime=0;

function resize(){
  dpr=Math.max(1,window.devicePixelRatio||1);
  [bgCv,cv].forEach(c=>{
    c.width=Math.floor(innerWidth*dpr);
    c.height=Math.floor(innerHeight*dpr);
    c.style.width=innerWidth+'px';
    c.style.height=innerHeight+'px';
  });
  [bgCtx,ctx].forEach(c=>c.setTransform(dpr,0,0,dpr,0,0));
  W=innerWidth;H=innerHeight;
  groundY=H-72;
  playerX=W/2-trayW/2;
  playerTargetX=playerX;
}
window.addEventListener('resize',resize);
resize();

function pickHero(el){
  document.querySelectorAll('#heroRow .choice').forEach(n=>n.classList.remove('sel'));
  el.classList.add('sel'); hero=el.dataset.hero;
}
function pickMode(el){
  document.querySelectorAll('#modeRow .pill').forEach(n=>n.classList.remove('sel'));
  el.classList.add('sel'); mode=el.dataset.mode;
}
function pickWorld(el){
  document.querySelectorAll('#worldRow .world').forEach(n=>n.classList.remove('sel'));
  el.classList.add('sel'); world=el.dataset.world;
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function randChoice(arr){return arr[Math.floor(Math.random()*arr.length)];}
function makeStars(){
  stars=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H*.72,r:Math.random()*1.6+.4,a:Math.random()*Math.PI*2,sp:.01+Math.random()*.02}));
}
function makeClouds(){
  clouds=Array.from({length:5},()=>({x:Math.random()*W,y:Math.random()*H*.3+30,w:80+Math.random()*120,h:35+Math.random()*20,vx:-.2-Math.random()*.25,a:.3+Math.random()*.35}));
}
function buildQuestion(){
  const qset=CHALLENGES[mode];
  currentQuestion=randChoice(qset);
  let choices=[currentQuestion.a,...currentQuestion.bad.slice(0,2)];
  while(choices.length<MODES[mode].choices) choices.push(randChoice(qset).bad[0]||qset[0].a);
  choices=[...new Set(choices)].slice(0,MODES[mode].choices);
  currentChoices=choices.sort(()=>Math.random()-.5);
}
function showTip(txt,dur=1600){
  const el=document.getElementById('gameTip');
  el.textContent=txt; el.classList.add('show');
  clearTimeout(showTip.t); showTip.t=setTimeout(()=>el.classList.remove('show'),dur);
}
function mission(txt,dur=1800){
  const el=document.getElementById('missionToast');
  el.textContent=txt; el.classList.add('show');
  clearTimeout(mission.t); mission.t=setTimeout(()=>el.classList.remove('show'),dur);
}
function floatText(x,y,t,col='#ffe566',size=20){
  floaters.push({x,y,t,col,size,a:1});
}
function burst(x,y,col,n=16,big=false){
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2,sp=(big?8:5)+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,l:1,d:.03+Math.random()*.03,r:big?6:2.5+Math.random()*2,col});
  }
}
function addBg(){
  const cfg=WORLDS[world];
  const g=bgCtx.createLinearGradient(0,0,0,H);
  cfg.sky.forEach((c,i)=>g.addColorStop(i/(cfg.sky.length-1),c));
  bgCtx.fillStyle=g; bgCtx.fillRect(0,0,W,H);
  stars.forEach(s=>{
    s.a+=s.sp; if(s.a>Math.PI*2)s.a=0;
    const al=.35+.25*Math.sin(s.a*2);
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=cfg.star+al+')'; bgCtx.fill();
  });
  if(cfg.clouds){
    clouds.forEach(c=>{
      c.x+=c.vx; if(c.x+c.w<0)c.x=W+20;
      bgCtx.save(); bgCtx.globalAlpha=c.a*.7; bgCtx.fillStyle='#dfe8ff';
      rr(bgCtx,c.x,c.y,c.w,c.h,c.h/2); bgCtx.fill();
      rr(bgCtx,c.x+c.w*.22,c.y-c.h*.35,c.w*.6,c.h*.75,c.h/2); bgCtx.fill();
      bgCtx.restore();
    });
  }
  const gnd=bgCtx.createLinearGradient(0,groundY,0,H);
  gnd.addColorStop(0,cfg.accent); gnd.addColorStop(1,cfg.ground);
  bgCtx.fillStyle=gnd; bgCtx.fillRect(0,groundY,W,H-groundY);
  bgCtx.save(); bgCtx.globalAlpha=.14; bgCtx.fillStyle='#fff'; bgCtx.fillRect(0,groundY,W,3); bgCtx.restore();
}
function currentAnswerText(){
  return currentQuestion?currentQuestion.a:'';
}
function spawnItem(){
  if(!gameRunning||paused)return;
  if(freezeTimer>0){spawnTimer=setTimeout(spawnItem,220); return;}
  buildQuestion();
  const correctIsDanger=Math.random()<.5;
  const cfg=MODES[mode];
  const pos=Math.random()*(W-140)+70;
  const isPower=Math.random()<.12;
  let item;
  if(isPower){
    const p=randChoice(POWERUPS);
    item={kind:'power',power:p.type,text:p.emoji,label:p.name,x:pos,y:-60,vy:cfg.speed*.85,vx:(Math.random()-.5)*.45,size:34,id:Math.random().toString(36).slice(2)};
  }else{
    const goodText=currentQuestion.a;
    const badText=randChoice(currentQuestion.bad) || '???';
    const showGood=correctIsDanger;
    const txt=showGood?goodText:badText;
    item={
      kind:'answer',
      text:txt,
      correct:txt===goodText,
      x:pos,
      y:-60,
      vy:cfg.speed+(Math.random()*.35),
      vx:(Math.random()-.5)*.55,
      rot:0,rotSp:(Math.random()-.5)*.04,
      wob:Math.random()*Math.PI*2,
      size:Math.max(24,Math.min(34,goodText.length<12?32:28)),
      id:Math.random().toString(36).slice(2)
    };
  }
  items.push(item);
  const delay=Math.max(220,cfg.spawn - Math.min(level*40,250));
  spawnTimer=setTimeout(spawnItem,delay+Math.random()*140);
}

function applyCorrect(x,y){
  score+=10+(mode==='advanced'?5:0);
  coins+=2;
  correct++; streak++; combo++;
  starsFixed++;
  timeNoMistake++;
  if(combo>=3) sfxWin();
  sfxGood();
  burst(x,y,WORLDS[world].trayGlow,16,true);
  floatText(x,y-20,'+10 ⭐','#ffe566',22);
  if(streak>=3) mission('✅ 3 correct in a row!');
  if(starsFixed>=starsForLevel) levelUp();
  if(streak>=3 && !missionDone.streak3){missionDone.streak3=true; coins+=8; mission('🏆 Mission: 3 in a row! +8 coins');}
}
function applyWrong(x,y){
  if(activePower.shield>0){activePower.shield--; showTip('Shield blocked it!'); return;}
  wrong++; streak=0; combo=0; lives=Math.max(0,lives-1); shake=12; timeNoMistake=0;
  sfxBad(); burst(x,y,'#ff5555',14); floatText(x,y-18,'Oops!','#ff8888',20);
  if(lives<=0) gameOver();
}
function levelUp(){
  level++; starsFixed=0; starsForLevel=Math.min(5+level*2,12);
  coins+=10; sfxWin();
  mission(`🎉 Level ${level}! The sky brightens!`,2200);
  burst(Math.random()*W,Math.random()*H*.5,'#ffe566',26,true);
}
function grantPower(type){
  activePower[type]=activePower[type]||0;
  activePower[type]+=8;
  sfxPower();
  if(type==='hint') showTip('Hint ready!');
  if(type==='freeze') showTip('Freeze activated!');
  if(type==='shield') showTip('Shield activated!');
}
function handleCatch(item){
  if(item.kind==='power'){ grantPower(item.power); floatText(item.x,item.y-18,item.label,'#ffffff',18); burst(item.x,item.y,'#88aaff',18); return; }
  const good = item.correct;
  if(good) applyCorrect(item.x,item.y); else applyWrong(item.x,item.y);
}
function createUIChoices(){
  const wrap=document.getElementById('choiceDock');
}

function setEmotion(state){
  const heroMap=HEROES[hero];
  currentEmotion=state==='good'?heroMap.happy:state==='bad'?heroMap.sad:heroMap.emoji;
}
let currentEmotion=HEROES[hero].emoji;

function drawPlayer(){
  const ty=groundY-12;
  playerBob+=.12;
  const bob=Math.sin(playerBob)*4*(currentEmotion===HEROES[hero].happy?1.8:1);
  ctx.save(); ctx.globalAlpha=.2; ctx.fillStyle='#000';
  ctx.scale(1,.16); ctx.beginPath();
  ctx.ellipse(playerX+trayW/2,(ty+12)*6.25,trayW*.36,trayW*.36,0,0,Math.PI*2);
  ctx.fill(); ctx.restore();

  if(activePower.shield>0){
    ctx.save(); ctx.strokeStyle='#88ffaa'; ctx.lineWidth=3; ctx.globalAlpha=.7;
    ctx.shadowColor='#88ffaa'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(playerX+trayW/2,ty-46+bob,56,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  const cfg=WORLDS[world];
  ctx.save();
  ctx.translate(playerX+trayW/2,ty-44+bob);
  ctx.font='72px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(currentEmotion,0,0);
  ctx.restore();

  ctx.save(); ctx.shadowColor=cfg.trayGlow; ctx.shadowBlur=24;
  const tg=ctx.createLinearGradient(playerX,ty,playerX,ty+trayH);
  tg.addColorStop(0,cfg.tray1); tg.addColorStop(1,cfg.tray2);
  ctx.fillStyle=tg; rr(ctx,playerX,ty,trayW,trayH,9); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.28)'; rr(ctx,playerX+6,ty+2,trayW-12,5,4); ctx.fill();
  ctx.restore();
}

function drawChoices(){
  currentChoices.forEach((ch,i)=>{
    const bx=W*0.15+i*((W*0.7)/(currentChoices.length));
    const by=130;
  });
}

function drawItems(){
  const cfg=WORLDS[world];
  const ty=groundY-12;
  const freezeMul=activePower.freeze>0?0.22:1;
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y += it.vy*freezeMul;
    it.x += it.vx*(activePower.freeze>0?.5:1);
    it.rot = (it.rot||0)+ (it.rotSp||0);
    it.wob = (it.wob||0)+.05;
    if(it.kind==='answer' && activePower.hint>0 && it.correct){
      it.glow='#ffffff';
    }
    if(it.y>H+60){
      if(it.kind==='answer' && it.correct) applyWrong(it.x,ty); // missed correct answer
      items.splice(i,1); continue;
    }

    const hit = it.y > ty-24 && it.y < ty+42;
    if(hit){
      const sameX = it.kind==='power' ? (it.x>playerX && it.x<playerX+trayW) : (it.x>playerX-12 && it.x<playerX+trayW);
      if(sameX){
        handleCatch(it);
        items.splice(i,1);
        continue;
      }
    }

    ctx.save();
    ctx.translate(it.x,it.y);
    if(it.rot) ctx.rotate(it.rot);
    const scale=1+Math.sin(it.wob)*.05;
    ctx.scale(scale,scale);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor = it.kind==='power' ? '#88aaff' : (it.correct ? cfg.trayGlow : '#ff6666');
    ctx.shadowBlur=20;
    ctx.font=`${it.size||30}px serif`;
    ctx.fillText(it.text,0,0);
    ctx.restore();

    if(it.kind==='answer'){
      ctx.save();
      ctx.strokeStyle = it.correct ? '#ffe566' : '#ff7777';
      ctx.globalAlpha=.35;
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(it.x,it.y,(it.size||28)*.72,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.13; p.l-=p.d;
    if(p.l<=0){particles.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=p.l;
    ctx.fillStyle=p.col;
    ctx.beginPath();
    ctx.arc(p.x,p.y,Math.max(0,p.r*p.l),0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y-=1.7; f.a-=.022;
    if(f.a<=0){floaters.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=f.a;
    ctx.fillStyle=f.col;
    ctx.font=`bold ${f.size}px Nunito,sans-serif`;
    ctx.textAlign='center';
    ctx.shadowColor=f.col; ctx.shadowBlur=14;
    ctx.fillText(f.t,f.x,f.y);
    ctx.restore();
  }
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('levelVal').textContent=level;
  document.getElementById('coinVal').textContent=coins;
  document.getElementById('livesVal').textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
  const comboEl=document.getElementById('combo');
  if(combo>=2){comboEl.textContent=`🔥 COMBO x${combo}`; comboEl.classList.add('show');}
  else comboEl.classList.remove('show');
  const pct=Math.min(100,(starsFixed/starsForLevel)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLbl').textContent=`FIX THE SKY • ${starsFixed}/${starsForLevel}`;
  ['hint','freeze','shield'].forEach(k=>{
    const el=document.getElementById('pw'+k[0].toUpperCase()+k.slice(1));
    const tEl=document.getElementById('pw'+k[0].toUpperCase()+k.slice(1)+'T');
    if(activePower[k]>0){
      el.classList.add('active');
      tEl.textContent=Math.ceil(activePower[k]/60)+'s';
    }else{
      el.classList.remove('active');
      tEl.textContent='';
    }
  });
}

function tickPowerups(){
  ['hint','freeze','shield'].forEach(k=>{ if(activePower[k]>0) activePower[k]--; });
  if(activePower.hint<=0) document.getElementById('gameTip').classList.remove('show');
}

function updatePlayer(){
  const spd=activePower.freeze>0?5:11;
  if(keys['ArrowLeft']||keys['a']) playerTargetX-=spd;
  if(keys['ArrowRight']||keys['d']) playerTargetX+=spd;
  playerTargetX=Math.max(0,Math.min(W-trayW,playerTargetX));
  if(pointerDown) playerTargetX=pointerX-trayW/2;
  playerX += (playerTargetX-playerX)*.22;
}
let keys={},pointerDown=false;

function promptFromQuestion(q){
  return q.q;
}
function showQuestionTip(){
  document.getElementById('gameTip').textContent=currentQuestion?qText(currentQuestion):'';
}
function qText(q){ return q.q; }

function maybeHint(){
  if(activePower.hint>0){
    showTip(`Hint: ${currentQuestion.a}`);
    activePower.hint=0;
  }
}

function gameOver(){
  gameRunning=false;
  clearTimeout(spawnTimer);
  sfxBad();
  setTimeout(()=>{
    document.getElementById('ovEmoji').textContent='🌙';
    document.getElementById('ovTitle').textContent='Sky Needs You';
    document.getElementById('ovScore').textContent=`Score: ${score} • Coins: ${coins}`;
    document.getElementById('ovSub').textContent=`You reached Level ${level}. The sky can still be restored.`;
    document.getElementById('overlay').classList.add('show');
  },350);
}
function showWin(){
  gameRunning=false;
  clearTimeout(spawnTimer);
  sfxWin();
  document.getElementById('ovEmoji').textContent='✨';
  document.getElementById('ovTitle').textContent='Sky Restored!';
  document.getElementById('ovScore').textContent=`Score: ${score} • Coins: ${coins}`;
  document.getElementById('ovSub').textContent='You fixed the stars and brought light back to the sky.';
  document.getElementById('overlay').classList.add('show');
}

function startGame(){
  try{
    if(AC.state==='suspended') AC.resume();
    sfxClick();
    gameRunning=true;paused=false;frame=0;score=0;level=1;coins=0;lives=3;combo=0;streak=0;correct=0;wrong=0;
    starsFixed=0;starsForLevel=5;timeNoMistake=0;timeSurvive=0;
    items=[];particles=[];floaters=[];missionDone={}; activePower={hint:0,freeze:0,shield:0};
    selectedAnswer=null; draggingId=null; currentQuestion=null; currentChoices=[];
    hero=document.querySelector('#heroRow .choice.sel')?.dataset.hero||hero;
    mode=document.querySelector('#modeRow .pill.sel')?.dataset.mode||mode;
    world=document.querySelector('#worldRow .world.sel')?.dataset.world||world;
    currentEmotion=HEROES[hero].emoji;
    makeStars(); makeClouds(); playerX=W/2-trayW/2; playerTargetX=playerX;
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('hud').style.display='flex';
    document.getElementById('coinDisplay').style.display='block';
    document.getElementById('powerBar').style.display='flex';
    document.getElementById('progressWrap').style.display='block';
    showTip(MODES[mode].tip,1800);
    mission('⭐ Fix 5 stars to brighten the sky',2200);
    if(spawnTimer) clearTimeout(spawnTimer);
    spawnTimer=setTimeout(spawnItem,500);
    if(!raf) loop();
  }catch(err){
    console.error(err);
    alert('Start failed: '+err.message);
  }
}

function restartGame(){ document.getElementById('overlay').classList.remove('show'); startGame(); }
function goHome(){
  gameRunning=false;
  clearTimeout(spawnTimer);
  document.getElementById('hud').style.display='none';
  document.getElementById('coinDisplay').style.display='none';
  document.getElementById('powerBar').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('homeScreen').classList.remove('hidden');
  ctx.clearRect(0,0,W,H); bgCtx.clearRect(0,0,W,H);
}

document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',restartGame);
document.getElementById('homeBtn').addEventListener('click',goHome);

document.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' ') e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key]=false);
document.addEventListener('mousemove',e=>{if(gameRunning){pointerX=e.clientX; pointerY=e.clientY;}});
document.addEventListener('mousedown',()=>pointerDown=true);
document.addEventListener('mouseup',()=>pointerDown=false);
document.addEventListener('touchstart',e=>{if(gameRunning&&e.touches[0]){pointerDown=true;pointerX=e.touches[0].clientX;}},{passive:true});
document.addEventListener('touchmove',e=>{if(gameRunning&&e.touches[0]){pointerX=e.touches[0].clientX; e.preventDefault();}},{passive:false});
document.addEventListener('touchend',()=>pointerDown=false);

function isOverPlayer(x){
  return x>playerX && x<playerX+trayW;
}

function processAnswer(it){
  const correct = it.text===currentQuestion.a;
  if(correct){
    sfxGood();
    score+=10;
    coins+=2;
    starsFixed++;
    streak++;
    combo++;
    correct++;
    setEmotion('good');
    burst(it.x,it.y,WORLDS[world].trayGlow,16,true);
    floatText(it.x,it.y-18,'+10 ⭐','#ffe566',22);
    if(streak===3 && !missionDone.streak3){missionDone.streak3=true; coins+=8; mission('🏆 3 correct in a row! +8 coins');}
    if(starsFixed>=starsForLevel) level++;
    if(starsFixed>=starsForLevel){ levelUp(); }
    if(combo>=5 && !missionDone.combo5){missionDone.combo5=true; coins+=12; mission('🏅 Combo Master! +12 coins');}
    if(mode==='beginner' && score%30===0) grantPower('hint');
    if(mode==='medium' && score%40===0) grantPower('freeze');
    if(mode==='advanced' && score%50===0) grantPower('shield');
  }else{
    wrong++;
    combo=0;
    streak=0;
    if(activePower.shield>0){ activePower.shield=0; showTip('Shield blocked the mistake!'); return; }
    lives--;
    sfxBad();
    setEmotion('bad');
    shake=14;
    burst(it.x,it.y,'#ff6666',14);
    floatText(it.x,it.y-18,'Oops!','#ff8888',20);
    if(lives<=0){ gameOver(); return; }
  }
}

function levelUp(){
  level++;
  starsFixed=0;
  starsForLevel=Math.min(5+level*2,12);
  makeStars();
  sfxWin();
  mission(`🎉 Level ${level}! The sky is brighter!`,2000);
  burst(Math.random()*W,Math.random()*H*.5,'#ffe566',24,true);
  if(level>=6){ showWin(); }
}

function spawnItem(){
  if(!gameRunning||paused)return;
  if(activePower.freeze>0){ spawnTimer=setTimeout(spawnItem,240); return; }
  currentQuestion = randChoice(CHALLENGES[mode]);
  const cfg=MODES[mode];
  const powerChance = Math.random()<.11;
  const x=Math.random()*(W-120)+60;
  if(powerChance){
    const p=randChoice(POWERUPS);
    items.push({kind:'power',power:p.type,text:p.emoji,label:p.name,x,y:-60,vy:cfg.speed*.8,vx:(Math.random()-.5)*.4,size:34,wob:Math.random()*Math.PI*2,id:Math.random().toString(36).slice(2)});
  }else{
    const good=currentQuestion.a;
    const bads=[...currentQuestion.bad];
    const isCorrect=Math.random()<.45;
    const text=isCorrect?good:randChoice(bads);
    items.push({kind:'answer',text,correct:text===good,x,y:-60,vy:cfg.speed+(Math.random()*.35),vx:(Math.random()-.5)*.55,size:Math.max(24,Math.min(34,good.length<15?32:28)),rot:0,rotSp:(Math.random()-.5)*.04,wob:Math.random()*Math.PI*2,id:Math.random().toString(36).slice(2)});
  }
  const delay=Math.max(230,cfg.spawn-(level*35));
  spawnTimer=setTimeout(spawnItem,delay+Math.random()*120);
}

function updateSkyProgress(){
  const bright=Math.min(1,(level-1)*.2 + starsFixed/starsForLevel*.2);
  document.body.style.background=`linear-gradient(180deg, rgba(8,16,47,1) 0%, rgba(30,45,114,${.85+bright*.15}) 40%, rgba(255,112,67,${.75+bright*.25}) 100%)`;
}

function loop(){
  raf=requestAnimationFrame(loop);
  if(!gameRunning)return;
  frame++;
  ctx.clearRect(0,0,W,H);
  if(shake>0){ ctx.save(); ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=.72; if(shake<.4) shake=0; }
  updatePlayer();
  tickPowerups();
  updateSkyProgress();
  if(!currentQuestion) currentQuestion=randChoice(CHALLENGES[mode]);
  questionTime++;
  timeSurvive++;

  addBg();
  drawItems();
  drawPlayer();
  drawParticles();
  updateHUD();

  if(shake>0) ctx.restore();
  if(activePower.hint>0) document.getElementById('gameTip').classList.add('show');
}

let raf=0;
window.addEventListener('pointermove',e=>{
  if(gameRunning){ pointerX=e.clientX; }
});

window.addEventListener('pointerdown',e=>{
  if(!gameRunning) return;
  pointerDown=true;
  pointerX=e.clientX;
  const clickedPower = false;
});
window.addEventListener('pointerup',()=>pointerDown=false);

startGame.toString;
</script>
