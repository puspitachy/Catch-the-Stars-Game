%%html
<div style="font-family:Arial;padding:20px">
<h2>⭐ Catch The Stars</h2>

<a href="#" id="openLink"
style="
font-size:24px;
font-weight:bold;
color:white;
background:gold;
padding:14px 24px;
border-radius:10px;
text-decoration:none;
display:inline-block;
">
▶ Open Game
</a>

<div id="gameBox" style="margin-top:20px;"></div>
</div>

<script>
document.getElementById("openLink").addEventListener("click", function(e){
e.preventDefault();
openGame();
});

function openGame(){

const box=document.getElementById("gameBox");

box.innerHTML=`
<div id="game" tabindex="0"></div>

<style>
#game{
position:relative;
width:100%;
height:650px;
overflow:hidden;
background:linear-gradient(to bottom,#000428,#001a66,#000000);
font-family:Arial;
outline:none;
cursor:pointer;
}

/* title */
#title{
position:absolute;
top:10px;
width:100%;
text-align:center;
font-size:38px;
font-weight:bold;
color:gold;
text-shadow:0 0 10px gold;
}

/* score */
#score{
position:absolute;
top:15px;
left:15px;
color:white;
font-size:24px;
font-weight:bold;
z-index:10;
}

/* moon */
#moon{
position:absolute;
top:60px;
right:80px;
width:70px;
height:70px;
border-radius:50%;
background:#fff2aa;
box-shadow:0 0 25px #fff2aa;
}

/* stars */
.sky{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
}

.star{
position:absolute;
font-size:34px;
filter:drop-shadow(0 0 8px gold);
}

/* tray */
#tray{
position:absolute;
bottom:120px;
left:300px;
width:140px;
height:15px;
background:gold;
border-radius:20px;
box-shadow:0 0 15px gold;
}

/* girl */
#girl{
position:absolute;
bottom:10px;
left:320px;
font-size:90px;
}

/* message */
#msg{
position:absolute;
top:250px;
width:100%;
text-align:center;
font-size:45px;
font-weight:bold;
color:white;
display:none;
}
</style>
`;

const game=document.getElementById("game");

/* create elements */
function add(id,text){
let el=document.createElement("div");
el.id=id;
el.innerHTML=text;
game.appendChild(el);
return el;
}

add("title","CATCH THE STARS");
let scoreBox=add("score","Score: 0");
add("moon","");
let tray=add("tray","");
let girl=add("girl","👧");
let msg=add("msg","");

let x=300;
let score=0;
let lives=3;
let playing=true;

/* focus for keyboard */
game.focus();

/* background stars */
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="sky";
s.style.left=Math.random()*900+"px";
s.style.top=Math.random()*650+"px";
game.appendChild(s);
}

/* move function */
function movePlayer(newX){

x=newX;

if(x<0) x=0;
if(x>850) x=850;

tray.style.left=x+"px";
girl.style.left=(x+20)+"px";
}

/* keyboard arrows */
game.addEventListener("keydown",function(e){

if(!playing) return;

if(e.key==="ArrowLeft"){
movePlayer(x-30);
}

if(e.key==="ArrowRight"){
movePlayer(x+30);
}

});

/* mouse move */
game.addEventListener("mousemove",function(e){

if(!playing) return;

const rect=game.getBoundingClientRect();
let mouseX=e.clientX-rect.left-70;

movePlayer(mouseX);

});

/* falling stars */
function makeStar(){

if(!playing) return;

let star=document.createElement("div");
star.className="star";
star.innerHTML="⭐";

let sx=Math.random()*850;
let sy=-30;

star.style.left=sx+"px";
star.style.top=sy+"px";

game.appendChild(star);

let drop=setInterval(function(){

sy+=5;
star.style.top=sy+"px";

/* catch */
if(sy>500 && sx>x-30 && sx<x+140){

score++;
scoreBox.innerHTML="Score: "+score;

star.remove();
clearInterval(drop);

if(score>=15){
win();
}
}

/* miss */
if(sy>650){

lives--;

star.remove();
clearInterval(drop);

if(lives<=0){
lose();
}

}

},25);
}

setInterval(makeStar,700);

function win(){
playing=false;
msg.style.display="block";
msg.innerHTML="🎉 YOU WIN!";
}

function lose(){
playing=false;
msg.style.display="block";
msg.innerHTML="💀 GAME OVER";
}

}
</script>
