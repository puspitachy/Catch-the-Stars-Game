<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>⭐ Star Saver Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--sky1:#1a0a3e;--sky2:#2d1b69;--sky3:#ff8c42;--accent:#ffe566;--ui-bg:rgba(0,0,0,.55);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a3e;font-family:'Nunito',sans-serif;color:#fff;user-select:none;touch-action:none;}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s;z-index:10;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.96);}

/* HOME */
#homeScreen{background:linear-gradient(180deg,#0d0630 0%,#1e0f5c 40%,#ff7043 100%);}
.home-logo{font-family:'Fredoka One',cursive;font-size:clamp(2.4rem,7vw,5rem);color:#ffe566;text-shadow:0 0 30px #ffe566aa,0 0 60px #ffaa0066;text-align:center;line-height:1.1;animation:logoBob 2.5s ease-in-out infinite;}
@keyframes logoBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.home-sub{font-family:'Fredoka One',cursive;font-size:clamp(.9rem,3vw,1.3rem);color:#cce8ff;text-align:center;margin:8px 0 30px;opacity:.9;}
.char-row{display:flex;gap:14px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
.char-pick{cursor:pointer;border-radius:20px;padding:14px 16px;border:3px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);transition:transform .2s,border-color .2s,box-shadow .2s;text-align:center;font-size:2.8rem;min-width:80px;}
.char-pick:hover,.char-pick.sel{transform:scale(1.1);border-color:#ffe566;box-shadow:0 0 20px #ffe56655;}
.char-pick .char-name{font-family:'Fredoka One',cursive;font-size:.75rem;color:#cce8ff;margin-top:4px;}
.btn-play{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#1a0a3e;background:linear-gradient(135deg,#ffe566,#ff9900);border:none;padding:16px 56px;border-radius:50px;cursor:pointer;box-shadow:0 8px 30px #ff990066;transition:transform .18s,box-shadow .18s;animation:btnPulse 2s ease-in-out infinite;}
@keyframes btnPulse{0%,100%{box-shadow:0 8px 30px #ff990066;}50%{box-shadow:0 8px 40px #ff9900aa,0 0 60px #ffe56655;}}
.btn-play:hover{transform:scale(1.06) translateY(-3px);}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hud-val{font-family:'Fredoka One',cursive;font-size:clamp(1.4rem,4vw,2rem);color:#ffe566;text-shadow:0 0 10px #ffe56688;line-height:1;}
.hud-lbl{font-size:.62rem;color:#aac4ff;letter-spacing:2px;text-transform:uppercase;}
.hud-lives{font-size:1.5rem;letter-spacing:3px;}
.hud-combo{font-family:'Fredoka One',cursive;font-size:1rem;color:#ff88ff;text-shadow:0 0 10px #ff88ff88;display:none;}
.hud-combo.show{display:block;animation:comboBounce .3s cubic-bezier(.2,.9,.25,1);}
@keyframes comboBounce{0%{transform:scale(.5);}100%{transform:scale(1);}}

/* POWER-UP BAR */
#powerBar{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:10px;pointer-events:none;}
.pw-icon{font-size:1.6rem;background:rgba(255,255,255,.15);border-radius:12px;padding:4px 10px;border:2px solid rgba(255,255,255,.25);opacity:0;transition:opacity .3s;position:relative;}
.pw-icon.active{opacity:1;animation:pwPulse 1s ease-in-out infinite;}
@keyframes pwPulse{0%,100%{box-shadow:0 0 0 rgba(255,229,102,0);}50%{box-shadow:0 0 16px rgba(255,229,102,.6);}}
.pw-timer{position:absolute;bottom:2px;right:4px;font-size:.6rem;font-family:'Fredoka One',cursive;color:#ffe566;}

/* PROGRESS */
#starProgress{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:20;width:min(380px,82vw);pointer-events:none;text-align:center;}
.prog-lbl{font-family:'Fredoka One',cursive;font-size:.74rem;color:#cce8ff;margin-bottom:4px;letter-spacing:2px;}
.prog-bg{height:12px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;border:1.5px solid rgba(255,255,255,.2);}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#ffe566,#ff9900);box-shadow:0 0 10px #ffe56666;transition:width .4s;}

/* OVERLAY */
#overlay{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,5,40,.88);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .4s;}
#overlay.show{opacity:1;pointer-events:all;}
.ov-emoji{font-size:5rem;animation:pop .4s cubic-bezier(.2,.95,.25,1);}
@keyframes pop{0%{transform:scale(.1);}100%{transform:scale(1);}}
.ov-title{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,6vw,4rem);margin:10px 0 6px;}
.ov-score{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#ffe566;margin-bottom:4px;}
.ov-sub{color:#aac4ff;font-size:.95rem;font-weight:700;margin-bottom:26px;text-align:center;line-height:1.8;padding:0 20px;}
.ov-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:'Fredoka One',cursive;font-size:1rem;border:none;padding:12px 28px;border-radius:50px;cursor:pointer;transition:transform .15s;}
.btn:hover{transform:scale(1.06) translateY(-2px);}
.btn-gold{color:#1a0a3e;background:linear-gradient(135deg,#ffe566,#ff9900);box-shadow:0 6px 20px #ff990055;}
.btn-dark{color:#cce8ff;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);}

/* MISSION TOAST */
#missionToast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:25;background:linear-gradient(135deg,rgba(40,0,80,.92),rgba(80,0,160,.92));border:2px solid #ffe56666;border-radius:18px;padding:12px 24px;font-family:'Fredoka One',cursive;font-size:1rem;color:#ffe566;text-align:center;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;}
#missionToast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* WORLD SELECT */
#worldBtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.world-btn{cursor:pointer;border-radius:14px;padding:10px 14px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);font-family:'Fredoka One',cursive;font-size:.85rem;color:#cce8ff;transition:transform .18s,border-color .18s,box-shadow .18s;text-align:center;}
.world-btn:hover,.world-btn.sel{transform:scale(1.06);border-color:#ffe566;box-shadow:0 0 18px #ffe56644;}
.world-btn .w-emoji{font-size:1.6rem;display:block;margin-bottom:4px;}

/* COIN */
#coinDisplay{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:20;font-family:'Fredoka One',cursive;font-size:1rem;color:#ffd700;background:rgba(0,0,0,.4);padding:5px 14px;border-radius:20px;border:1.5px solid #ffd70044;pointer-events:none;}

@media(max-width:500px){
  .char-row{gap:8px;}
  .char-pick{padding:10px 10px;font-size:2.2rem;min-width:64px;}
  .btn-play{font-size:1.3rem;padding:13px 40px;}
  #homeScreen{justify-content:flex-start;padding-top:20px;}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="canvas"></canvas>

<div id="homeScreen" class="screen">
  <div class="home-logo">⭐ Star Saver<br>Adventure</div>
  <div class="home-sub">The night sky needs your help! 🌙</div>

  <div style="font-family:'Fredoka One',cursive;font-size:.85rem;color:#aac4ff;letter-spacing:2px;margin-bottom:12px;">CHOOSE YOUR HERO</div>
  <div class="char-row" id="charRow">
    <div class="char-pick sel" data-char="bunny" onclick="pickChar(this)">🐰<div class="char-name">Bunny</div></div>
    <div class="char-pick" data-char="robot" onclick="pickChar(this)">🤖<div class="char-name">Robot</div></div>
    <div class="char-pick" data-char="cat" onclick="pickChar(this)">🐱<div class="char-name">Kitty</div></div>
    <div class="char-pick" data-char="dino" onclick="pickChar(this)">🦕<div class="char-name">Dino</div></div>
  </div>

  <div style="font-family:'Fredoka One',cursive;font-size:.85rem;color:#aac4ff;letter-spacing:2px;margin-bottom:10px;">CHOOSE YOUR WORLD</div>
  <div id="worldBtns">
    <div class="world-btn sel" data-world="sky" onclick="pickWorld(this)"><span class="w-emoji">🌈</span>Sky Land</div>
    <div class="world-btn" data-world="space" onclick="pickWorld(this)"><span class="w-emoji">🚀</span>Outer Space</div>
    <div class="world-btn" data-world="galaxy" onclick="pickWorld(this)"><span class="w-emoji">🌌</span>Galaxy</div>
  </div>

  <button class="btn-play" onclick="startGame()">▶ Play Now!</button>
  <div style="font-size:.78rem;color:#7788aa;margin-top:14px;">🖱️ Mouse · ⌨️ Arrow Keys · 📱 Touch</div>
</div>

<div id="hud" style="display:none;">
  <div class="hud-block">
    <div class="hud-val" id="hudScore">0</div>
    <div class="hud-lbl">Score</div>
  </div>
  <div class="hud-block">
    <div class="hud-lives" id="hudLives">❤️❤️❤️</div>
    <div class="hud-combo" id="hudCombo">COMBO x1</div>
  </div>
  <div class="hud-block">
    <div class="hud-val" id="hudLevel">1</div>
    <div class="hud-lbl">Level</div>
  </div>
</div>
<div id="coinDisplay" style="display:none;">🪙 <span id="coinVal">0</span></div>

<div id="powerBar">
  <div class="pw-icon" id="pwMagnet">🧲<span class="pw-timer" id="pwMagnetT"></span></div>
  <div class="pw-icon" id="pwShield">🛡️<span class="pw-timer" id="pwShieldT"></span></div>
  <div class="pw-icon" id="pwSlow">⏱️<span class="pw-timer" id="pwSlowT"></span></div>
</div>

<div id="starProgress" style="display:none;">
  <div class="prog-lbl" id="progLbl">STARS TO NEXT LEVEL</div>
  <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div id="missionToast"></div>

<div id="overlay">
  <div class="ov-emoji" id="ovEmoji"></div>
  <div class="ov-title" id="ovTitle"></div>
  <div class="ov-score" id="ovScore"></div>
  <div class="ov-sub" id="ovSub"></div>
  <div class="ov-btns">
    <button class="btn btn-gold" onclick="restartGame()">🔄 Play Again</button>
    <button class="btn btn-dark" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t='sine',d=.15,v=.15,del=0){
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.setValueAtTime(f,AC.currentTime+del);
  g.gain.setValueAtTime(v,AC.currentTime+del);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+del+d);
  o.start(AC.currentTime+del);o.stop(AC.currentTime+del+d);}catch{}
}
function sfxStar(pts){[523,659,784][Math.min(pts-1,2)]&&tone([523,659,784][Math.min(pts-1,2)],'sine',.18,.2);if(pts>1)tone([523,659,784][Math.min(pts-1,2)]*1.5,'sine',.1,.1,.07);}
function sfxCombo(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',.18,.15,i*.07));}
function sfxHit(){tone(150,'sawtooth',.28,.22);tone(100,'square',.22,.15,.1);}
function sfxMiss(){tone(300,'sawtooth',.18,.15);}
function sfxPower(){[440,550,660,880].forEach((f,i)=>tone(f,'sine',.2,.18,i*.06));}
function sfxWin(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,'sine',.28,.18,i*.11));}
function sfxLose(){[330,220,180,140].forEach((f,i)=>tone(f,'sawtooth',.28,.18,i*.13));}
function sfxCoin(){tone(880,'sine',.12,.15);tone(1100,'sine',.1,.12,.06);}
function sfxClick(){tone(700,'sine',.08,.12);tone(900,'sine',.06,.08,.04);}
document.addEventListener('click',()=>AC.state==='suspended'&&AC.resume(),{once:true});
document.addEventListener('touchstart',()=>AC.state==='suspended'&&AC.resume(),{once:true});

const WORLDS={
  sky:{sky:['#0d0630','#1e0f5c','#3d1a8a','#7b3fa0','#ff8c42','#ffb347'],groundCol:'#1a3a6a',groundAccent:'#2255aa',clouds:true,bgStarCol:'rgba(220,230,255,',tray1:'#ffe97a',tray2:'#e6a800',trayGlow:'#ffe566'},
  space:{sky:['#000308','#03050f','#060210','#0a0320','#03050f','#000308'],groundCol:'#0a0320',groundAccent:'#1a0550',clouds:false,bgStarCol:'rgba(180,160,255,',tray1:'#88aaff',tray2:'#3355cc',trayGlow:'#88aaff'},
  galaxy:{sky:['#050010','#0d0030','#1a0050','#2d0070','#1a0050','#050010'],groundCol:'#0d0030',groundAccent:'#2d0070',clouds:false,bgStarCol:'rgba(255,180,255,',tray1:'#ff88ff',tray2:'#aa00cc',trayGlow:'#ff88ff'}
};
const CHARS={
  bunny:{emoji:'🐰',happy:'🥰',sad:'😢',run:'🐰'},
  robot:{emoji:'🤖',happy:'🤩',sad:'😟',run:'🤖'},
  cat:{emoji:'🐱',happy:'😻',sad:'😿',run:'🐱'},
  dino:{emoji:'🦕',happy:'🦖',sad:'🦕',run:'🦕'}
};

let selChar='bunny',selWorld='sky',worldCfg=WORLDS.sky,charCfg=CHARS.bunny;
function pickChar(el){document.querySelectorAll('.char-pick').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');selChar=el.dataset.char;charCfg=CHARS[selChar];}
function pickWorld(el){document.querySelectorAll('.world-btn').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');selWorld=el.dataset.world;worldCfg=WORLDS[selWorld];}

const bgCv=document.getElementById('bg'),bgCtx=bgCv.getContext('2d');
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=Math.max(1,window.devicePixelRatio||1);
  [bgCv,cv].forEach(c=>{c.width=Math.floor(innerWidth*dpr);c.height=Math.floor(innerHeight*dpr);c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';});
  [bgCtx,ctx].forEach(c=>c.setTransform(dpr,0,0,dpr,0,0));
  W=innerWidth;H=innerHeight;
  if(gameRunning) initGround();
}
resize();window.addEventListener('resize',resize);

let score=0,lives=3,level=1,coins=0,combo=0,comboTimer=null;
let gameRunning=false,paused=false;
let starsThisLevel=0,starsForLevel=10;
let timeAlive=0,frameCount=0;

const TRAY_W=140,TRAY_H=18;
let px,py,ptarget,pemotion='idle',pemotionTimer=null;
let pvelX=0,pscale=1,pflip=1;
let shieldActive=false,magnetActive=false,slowActive=false;
let shieldTimer=0,magnetTimer=0,slowTimer=0;

const MISSIONS=[
  {id:'catch10',desc:'Catch 10 stars! ⭐',check:()=>starsThisLevel>=10,done:false},
  {id:'combo5',desc:'Get a combo of 5! 🔥',check:()=>combo>=5,done:false},
  {id:'noHit20',desc:'Survive 20s without getting hit! 🛡️',check:()=>timeNoHit>=20,done:false},
];
let timeNoHit=0,activeMission=null,missionTimer=null;

let items=[],particles=[],floatTexts=[],bgStars=[],clouds=[];
let spawnTimer=null,spawnInterval=1000;
let shakeAmt=0;

const CATCH_ITEMS=[
  {emoji:'⭐',pts:1,size:36,glow:'#ffe566',type:'star',freq:.35,coin:1},
  {emoji:'✨',pts:3,size:34,glow:'#ffffff',type:'golden',freq:.18,coin:3},
  {emoji:'🍬',pts:2,size:34,glow:'#ff88cc',type:'candy',freq:.15,coin:2},
  {emoji:'💡',pts:2,size:34,glow:'#88ffff',type:'orb',freq:.12,coin:2},
  {emoji:'🧲',pts:0,size:32,glow:'#88aaff',type:'magnet',freq:.05,coin:0},
  {emoji:'🛡️',pts:0,size:32,glow:'#88ffaa',type:'shield',freq:.05,coin:0},
  {emoji:'⏱️',pts:0,size:32,glow:'#ffaa88',type:'slow',freq:.04,coin:0},
  {emoji:'🌈',pts:5,size:38,glow:'#ff88ff',type:'rainbow',freq:.02,coin:5}
];
const AVOID_ITEMS=[
  {emoji:'☁️',pts:-2,size:38,glow:'#889999',type:'cloud',freq:.3},
  {emoji:'☄️',pts:-1,size:34,glow:'#ff6633',type:'meteor',freq:.4,life:true},
  {emoji:'😴',pts:0,size:34,glow:'#aaaaff',type:'sleep',freq:.3,slow:true}
];

function pickItem(arr){
  const total=arr.reduce((s,i)=>s+i.freq,0);
  let r=Math.random()*total;
  for(const it of arr){r-=it.freq;if(r<=0)return it;}
  return arr[arr.length-1];
}
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

let bgPhase=0;
let groundY;
function initGround(){groundY=H-70;}

function makeBgStars(){
  bgStars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H*.75,r:Math.random()*1.6+.3,a:Math.random(),sp:Math.random()*.012+.004,hue:Math.random()*60}));
}
function makeClouds(){
  clouds=Array.from({length:6},()=>({x:Math.random()*W,y:Math.random()*H*.35+40,vx:-.4-Math.random()*.4,w:80+Math.random()*120,h:40+Math.random()*30,alpha:.6+Math.random()*.3}));
}
function drawBg(){
  const wc=worldCfg,sky=wc.sky;
  const phase=Math.min(1,score/200);
  const g=bgCtx.createLinearGradient(0,0,0,H);
  function lerp(a,b,t){return Math.round(a+(b-a)*t);}
  function parseC(hex){const r=parseInt(hex.slice(1,3),16),gr=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,gr,b];}
  function blendColors(c1,c2,t){const a=parseC(c1),b=parseC(c2);return `rgb(${lerp(a[0],b[0],t)},${lerp(a[1],b[1],t)},${lerp(a[2],b[2],t)})`;}
  const nightSky=['#0d0630','#1e0f5c','#2d1b69'];
  const daySky=sky;
  for(let i=0;i<3;i++) g.addColorStop(i/2,blendColors(nightSky[i]||nightSky[0],daySky[Math.floor(i*(daySky.length-1)/2)]||daySky[0],phase));
  bgCtx.fillStyle=g;bgCtx.fillRect(0,0,W,H);

  bgStars.forEach(s=>{
    s.a+=s.sp;if(s.a>1)s.a=0;
    const al=Math.sin(s.a*Math.PI)*(1-phase*.7);
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=wc.bgStarCol+al+')';bgCtx.fill();
  });

  if(wc.clouds){
    clouds.forEach(c=>{
      c.x+=c.vx;if(c.x+c.w<0)c.x=W+20;
      bgCtx.save();bgCtx.globalAlpha=c.alpha*.4*(1-phase*.3);bgCtx.fillStyle='#c8d8ff';
      rr(bgCtx,c.x,c.y,c.w,c.h,c.h/2);bgCtx.fill();
      rr(bgCtx,c.x+c.w*.2,c.y-c.h*.4,c.w*.6,c.h*.8,c.h*.4);bgCtx.fill();
      bgCtx.restore();
    });
  }

  const gndGrad=bgCtx.createLinearGradient(0,groundY,0,H);
  gndGrad.addColorStop(0,wc.groundAccent);gndGrad.addColorStop(1,wc.groundCol);
  bgCtx.fillStyle=gndGrad;bgCtx.fillRect(0,groundY,W,H-groundY);

  bgCtx.save();bgCtx.globalAlpha=.12+phase*.1;bgCtx.fillStyle='#ffffff';bgCtx.fillRect(0,groundY,W,3);bgCtx.restore();
}

function spawnItem(){
  if(!gameRunning||paused)return;
  const bad=Math.random()<(.2+level*.03);
  const t=bad?{...pickItem(AVOID_ITEMS)}:{...pickCatch()};
  const speed=(2.5+level*.4+(Math.random()*.5))*(slowActive?.5:1);
  items.push({x:Math.random()*(W-60)+30,y:-50,t,vy:speed,vx:(Math.random()-.5)*.6,wb:Math.random()*Math.PI*2,wsp:(Math.random()-.5)*.035,rot:0,rotSp:(Math.random()-.5)*.05,alpha:1,caught:false,size:t.size||34});
  const interval=Math.max(200,spawnInterval-(level-1)*60);
  spawnTimer=setTimeout(spawnItem,interval+Math.random()*200);
}
function pickCatch(){
  const total=CATCH_ITEMS.reduce((s,i)=>s+i.freq,0);
  let r=Math.random()*total;
  for(const it of CATCH_ITEMS){r-=it.freq;if(r<=0)return{...it};}
  return {...CATCH_ITEMS[0]};
}

function burst(x,y,col,n=18,big=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=(big?10:6)+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:1,d:.03+Math.random()*.02,r:big?6:3+Math.random()*3,col,star:big&&Math.random()>.5});
  }
}
function sparkle(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2,sp=4+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:1,d:.04,r:2+Math.random()*2,col,twinkle:true});
  }
}
function rainbow(x,y){
  const cols=['#ff4444','#ff8800','#ffee00','#44dd44','#4488ff','#aa44ff'];
  cols.forEach((c,i)=>setTimeout(()=>burst(x,y,c,8),i*50));
}
function ftxt(x,y,t,col='#ffe566',size=22){floatTexts.push({x,y,t,l:1,col,size});}

function uhud(){
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudLives').textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
  document.getElementById('hudLevel').textContent=level;
  document.getElementById('coinVal').textContent=coins;
  const pct=Math.min(100,starsThisLevel/starsForLevel*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=`⭐ ${starsThisLevel}/${starsForLevel} — LEVEL ${level}`;
  const comboEl=document.getElementById('hudCombo');
  if(combo>=2){comboEl.textContent=`🔥 COMBO x${combo}`;comboEl.classList.add('show');}
  else comboEl.classList.remove('show');
  ['Magnet','Shield','Slow'].forEach(p=>{
    const el=document.getElementById('pw'+p),tel=document.getElementById('pw'+p+'T');
    const active=p==='Magnet'?magnetActive:p==='Shield'?shieldActive:slowActive;
    const timer=p==='Magnet'?magnetTimer:p==='Shield'?shieldTimer:slowTimer;
    el.classList.toggle('active',active);
    if(active) tel.textContent=Math.ceil(timer/60)+'s';
  });
}

let playerBob=0;
function drawPlayer(){
  const ty=groundY-10;
  playerBob+=.12;
  const bobY=Math.sin(playerBob)*3*(pemotion==='happy'?2.5:1);

  ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='#000';
  ctx.scale(1,.15);ctx.beginPath();
  ctx.ellipse(px+TRAY_W/2,(ty+10)*6.67,TRAY_W*.38,TRAY_W*.38,0,0,Math.PI*2);
  ctx.fill();ctx.restore();

  if(shieldActive){
    ctx.save();ctx.strokeStyle='#88ffaa';ctx.lineWidth=3;ctx.globalAlpha=.6+Math.sin(frameCount*.1)*.3;
    ctx.shadowColor='#88ffaa';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(px+TRAY_W/2,ty-50+bobY,52,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  if(magnetActive){
    ctx.save();ctx.globalAlpha=.15+Math.sin(frameCount*.08)*.1;
    const mg=ctx.createRadialGradient(px+TRAY_W/2,ty-40+bobY,10,px+TRAY_W/2,ty-40+bobY,120);
    mg.addColorStop(0,'#88aaff55');mg.addColorStop(1,'transparent');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(px+TRAY_W/2,ty-40+bobY,120,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  const em=pemotion==='happy'?charCfg.happy:pemotion==='sad'?charCfg.sad:charCfg.emoji;
  ctx.save();
  ctx.translate(px+TRAY_W/2,ty-45+bobY);
  if(Math.abs(pvelX)>2) ctx.scale(pvelX>0?1:-1,1);
  if(pemotion==='happy'){ctx.rotate(Math.sin(frameCount*.2)*.18);}
  ctx.font='72px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(em,0,0);
  ctx.restore();

  ctx.save();ctx.shadowColor=worldCfg.trayGlow;ctx.shadowBlur=24;
  const tg=ctx.createLinearGradient(px,ty,px,ty+TRAY_H);
  tg.addColorStop(0,worldCfg.tray1);tg.addColorStop(1,worldCfg.tray2);
  ctx.fillStyle=tg;rr(ctx,px,ty,TRAY_W,TRAY_H,9);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.3)';rr(ctx,px+6,ty+2,TRAY_W-12,5,4);ctx.fill();
  ctx.globalAlpha=.1+Math.sin(frameCount*.05)*.08;
  rr(ctx,px-4,ty-4,TRAY_W+8,TRAY_H+8,13);ctx.fill();
  ctx.restore();
}

function updItems(){
  const ty=groundY-10;
  const spd=slowActive?.55:1;
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.vy*spd;it.vx+=Math.sin(it.wb)*.02;it.x+=it.vx;
    it.wb+=it.wsp;it.rot+=it.rotSp;
    if(magnetActive&&it.t.type!=='cloud'&&it.t.type!=='meteor'&&it.t.type!=='sleep'){
      const dx=(px+TRAY_W/2)-it.x,dy=ty-it.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<200){it.x+=dx*.04;it.y+=dy*.04;}
    }
    it.x=Math.max(20,Math.min(W-20,it.x));
    const hit=it.y>ty-22&&it.y<ty+38&&it.x>px-10&&it.x<px+TRAY_W;
    if(hit){handleCatch(it,it.x,ty);items.splice(i,1);continue;}
    if(it.y>H+50){
      if(it.t.pts>0){missedStar(it.x,it.y);}
      items.splice(i,1);continue;
    }
    const wobScale=1+Math.sin(it.wb)*0.06;
    ctx.save();
    ctx.translate(it.x,it.y);ctx.rotate(it.rot);ctx.scale(wobScale,wobScale);
    ctx.shadowColor=it.t.glow;ctx.shadowBlur=20;
    ctx.font=`${it.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(it.t.emoji,0,0);
    ctx.restore();
    if(it.t.type==='rainbow'||it.t.type==='golden'){
      ctx.save();ctx.globalAlpha=.3+Math.sin(frameCount*.1+i)*.2;
      ctx.strokeStyle=it.t.glow;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(it.x,it.y,it.size*.65,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
  }
}

function handleCatch(it,x,ty){
  const t=it.t;
  if(t.pts<0){
    if(shieldActive){
      burst(x,ty,'#88ffaa',16);ftxt(x,ty-30,'BLOCKED! 🛡️','#88ffaa');sfxPower();
      return;
    }
    if(t.life){lives=Math.max(0,lives-1);shakeAmt=14;sfxHit();}
    if(t.slow){ftxt(x,ty-30,'Zzz... 😴','#aaaaff');}
    score=Math.max(0,score+t.pts);
    burst(x,ty,'#ff4444',14);ftxt(x,ty-30,t.pts<0?`${t.pts} 💥`:'Oops!','#ff6666');
    setEmotion('sad',1200);timeNoHit=0;
    if(lives<=0){loseGame();return;}
  } else if(t.type==='magnet'){
    magnetActive=true;magnetTimer=300;sfxPower();
    burst(x,ty,'#88aaff',14);ftxt(x,ty-30,'MAGNET! 🧲','#88aaff');
  } else if(t.type==='shield'){
    shieldActive=true;shieldTimer=300;sfxPower();
    burst(x,ty,'#88ffaa',14);ftxt(x,ty-30,'SHIELD! 🛡️','#88ffaa');
  } else if(t.type==='slow'){
    slowActive=true;slowTimer=360;sfxPower();
    burst(x,ty,'#ffaa88',14);ftxt(x,ty-30,'SLOW-MO! ⏱️','#ffaa88');
  } else {
    const mul=combo>=5?3:combo>=3?2:1;
    const earned=t.pts*mul;
    score+=earned;starsThisLevel++;coins+=t.coin||1;sfxStar(t.pts);sfxCoin();
    burst(x,ty,t.glow,18,t.type==='rainbow');
    sparkle(x,ty-20,t.glow);
    if(t.type==='rainbow') rainbow(x,ty);
    const comboStr=mul>1?` x${mul}`:'';
    ftxt(x,ty-30,`+${earned}${comboStr}${t.pts>=3?' 🌟':''}`,t.glow);
    setEmotion('happy',900);
    combo++;clearTimeout(comboTimer);comboTimer=setTimeout(()=>{combo=0;uhud();},1500);
    if(combo===5)sfxCombo();
    if(combo>=5) sparkleRain();
    checkLevelUp();
  }
  uhud();checkMissions();
}

function missedStar(x,y){
  sfxMiss();combo=0;
  ftxt(x||W/2,Math.min(y,H-100),'Missed! 😢','#ff8888',18);
  uhud();
}

function sparkleRain(){
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const x=Math.random()*W;
      sparkle(x,-10,'#ffe566',6);
      sparkle(x,-10,'#ff88ff',4);
    },i*60);
  }
}

function checkLevelUp(){
  if(starsThisLevel>=starsForLevel){
    level++;starsThisLevel=0;starsForLevel=Math.min(10+level*3,30);
    spawnInterval=Math.max(300,1000-level*60);
    sfxWin();
    showMission(`🎉 LEVEL ${level}! You're amazing!`);
    for(let i=0;i<5;i++) setTimeout(()=>burst(Math.random()*W,Math.random()*H*.5,['#ffe566','#ff88ff','#66ff88','#55ddff'][i%4],22,true),i*200);
  }
}

function setEmotion(e,dur){
  pemotion=e;clearTimeout(pemotionTimer);
  pemotionTimer=setTimeout(()=>pemotion='idle',dur);
}

function showMission(txt,dur=2500){
  const el=document.getElementById('missionToast');
  el.textContent=txt;el.classList.add('show');
  clearTimeout(missionTimer);missionTimer=setTimeout(()=>el.classList.remove('show'),dur);
}
function checkMissions(){
  MISSIONS.forEach(m=>{
    if(!m.done&&m.check()){m.done=true;showMission(`✅ Mission done: ${m.desc}`,3000);sfxWin();coins+=10;}
  });
}

const keys={};
let touchX=null;
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '){e.preventDefault();}});
document.addEventListener('keyup',e=>keys[e.key]=false);
document.addEventListener('mousemove',e=>{if(gameRunning)touchX=e.clientX-TRAY_W/2;});
document.addEventListener('touchstart',e=>{if(gameRunning&&e.touches[0])touchX=e.touches[0].clientX-TRAY_W/2;},{passive:true});
document.addEventListener('touchmove',e=>{if(gameRunning&&e.touches[0]){touchX=e.touches[0].clientX-TRAY_W/2;e.preventDefault();}},{passive:false});

function updPlayer(){
  const spd=slowActive?8:14;
  if(keys['ArrowLeft']||keys['a']){ptarget-=spd;pvelX=-spd;}
  else if(keys['ArrowRight']||keys['d']){ptarget+=spd;pvelX=spd;}
  else pvelX*=.8;
  if(touchX!==null) ptarget=touchX;
  ptarget=Math.max(0,Math.min(W-TRAY_W,ptarget));
  px+=(ptarget-px)*.2;
}

function drawFX(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.l-=p.d;
    if(p.l<=0){particles.splice(i,1);continue;}
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.r*p.l),0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.globalAlpha=Math.max(0,p.l);ctx.fill();ctx.globalAlpha=1;
  }
  for(let i=floatTexts.length-1;i>=0;i--){
    const f=floatTexts[i];f.y-=1.8;f.l-=.024;
    if(f.l<=0){floatTexts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=Math.max(0,f.l);
    ctx.font=`bold ${f.size||22}px Nunito,sans-serif`;
    ctx.fillStyle=f.col;ctx.textAlign='center';ctx.shadowColor=f.col;ctx.shadowBlur=14;
    ctx.fillText(f.t,f.x,f.y);ctx.restore();
  }
}

let rafId;
function loop(){
  rafId=requestAnimationFrame(loop);
  if(!gameRunning||paused)return;
  frameCount++;
  ctx.clearRect(0,0,W,H);
  if(shakeAmt>0){ctx.save();ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);shakeAmt*=.72;if(shakeAmt<.5)shakeAmt=0;}
  drawBg();
  timeAlive+=1/60;timeNoHit+=1/60;
  if(magnetActive){magnetTimer--;if(magnetTimer<=0)magnetActive=false;}
  if(shieldActive){shieldTimer--;if(shieldTimer<=0)shieldActive=false;}
  if(slowActive){slowTimer--;if(slowTimer<=0)slowActive=false;}
  updPlayer();
  updItems();
  drawPlayer();
  drawFX();
  if(shakeAmt>0)ctx.restore();
  uhud();
}

function startGame(){
  score=0;lives=3;level=1;coins=0;combo=0;starsThisLevel=0;starsForLevel=10;
  timeAlive=0;timeNoHit=0;frameCount=0;spawnInterval=1000;
  magnetActive=false;shieldActive=false;slowActive=false;
  magnetTimer=shieldTimer=slowTimer=0;
  items=[];particles=[];floatTexts=[];
  MISSIONS.forEach(m=>m.done=false);
  worldCfg=WORLDS[selWorld];charCfg=CHARS[selChar];
  initGround();makeBgStars();makeClouds();
  px=W/2-TRAY_W/2;ptarget=px;pvelX=0;pemotion='idle';
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hud').style.display='flex';
  document.getElementById('coinDisplay').style.display='block';
  document.getElementById('starProgress').style.display='block';
  document.getElementById('powerBar').style.display='flex';
  gameRunning=true;paused=false;
  if(spawnTimer)clearTimeout(spawnTimer);
  setTimeout(spawnItem,600);
  showMission('⭐ Catch the falling stars! Restore the sky!',2500);
  sfxClick();
  if(!rafId)loop();
}

function restartGame(){
  document.getElementById('overlay').classList.remove('show');
  startGame();
}

function goHome(){
  gameRunning=false;clearTimeout(spawnTimer);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hud').style.display='none';
  document.getElementById('coinDisplay').style.display='none';
  document.getElementById('starProgress').style.display='none';
  document.getElementById('powerBar').style.display='none';
  document.getElementById('homeScreen').classList.remove('hidden');
  ctx.clearRect(0,0,W,H);bgCtx.clearRect(0,0,W,H);
}

function loseGame(){
  gameRunning=false;clearTimeout(spawnTimer);sfxLose();
  setTimeout(()=>{
    document.getElementById('ovEmoji').textContent='😢';
    document.getElementById('ovTitle').textContent='Oh No!';
    document.getElementById('ovTitle').style.color='#ff8888';
    document.getElementById('ovScore').textContent=`Score: ${score} ⭐  Coins: ${coins} 🪙`;
    document.getElementById('ovSub').innerHTML=`You reached <b>Level ${level}</b>!<br>The sky needs you — try again! 🌙`;
    document.getElementById('overlay').classList.add('show');
  },400);
}

makeBgStars();makeClouds();initGround();
(function idleLoop(){
  requestAnimationFrame(idleLoop);
  if(gameRunning)return;
  bgCtx.clearRect(0,0,W,H);
  worldCfg=WORLDS[selWorld]||WORLDS.sky;
  bgPhase=0;score=0;drawBg();
})();

loop();
</script>
